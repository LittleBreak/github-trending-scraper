name: Weekly Fetch Trending Repos

on:
  schedule:
    # Every 1st of the month at 12:00 Beijing time (04:00 UTC)
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      template:
        description: 'Card template number (1-18, leave empty for random)'
        required: false

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Restore Xiaohongshu cookies
        if: vars.ENABLE_PUBLISH == 'true'
        run: |
          mkdir -p data/xhs-cookies
          echo '${{ secrets.XHS_COOKIES }}' > data/xhs-cookies/cookies.json

      - name: Start xiaohongshu-mcp service
        if: vars.ENABLE_PUBLISH == 'true'
        run: |
          docker compose up -d xiaohongshu-mcp
          echo "Waiting for xiaohongshu-mcp service to be ready..."
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null -X POST http://localhost:18060/mcp \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0.0"}},"id":1}'; then
              echo "Service is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Service failed to start within 30s"
              docker compose logs xiaohongshu-mcp
              exit 1
            fi
            sleep 1
          done

      - name: Run scraper
        run: pnpm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEMPLATE: ${{ github.event.inputs.template || vars.TEMPLATE }}
          ENABLE_PUBLISH: ${{ vars.ENABLE_PUBLISH || 'false' }}
          XHS_MCP_URL: http://localhost:18060/mcp

      - name: Stop xiaohongshu-mcp service
        if: always() && vars.ENABLE_PUBLISH == 'true'
        run: docker compose down

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y.%m)" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          cd output
          zip -r ../trending-repos-${{ steps.date.outputs.date }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Trending Repos v${{ steps.date.outputs.date }}
          body: |
            GitHub Trending 数据 - ${{ steps.date.outputs.date }}

            包含本月抓取的 trending repos 数据和卡片图片。
          files: trending-repos-*.zip
