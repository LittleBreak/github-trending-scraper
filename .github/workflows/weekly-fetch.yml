name: Weekly Fetch Trending Repos

on:
  schedule:
    # Every 1st of the month at 12:00 Beijing time (04:00 UTC)
    - cron: '0 4 1 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run scraper
        run: pnpm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y.%m)" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          cd output
          zip -r ../trending-repos-${{ steps.date.outputs.date }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Trending Repos v${{ steps.date.outputs.date }}
          body: |
            GitHub Trending 数据 - ${{ steps.date.outputs.date }}

            包含本月抓取的 trending repos 数据和卡片图片。
          files: trending-repos-*.zip
