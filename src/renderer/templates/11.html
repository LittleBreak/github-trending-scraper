<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Template 11</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "primary": "#f20d0d",
            },
            fontFamily: {
                "display": ["Spline Sans", "Noto Sans SC", "sans-serif"]
            },
            backgroundImage: {
                'halftone': 'radial-gradient(circle, #f20d0d 1px, transparent 1.5px)',
                'halftone-white': 'radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1.5px)',
            }
        },
    },
}
</script>
<style>
.manga-shadow-text {
    text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}
.manga-panel-border {
    border: 3px solid #000;
    box-shadow: 4px 4px 0px rgba(242, 13, 13, 0.4);
}
.clip-burst {
    clip-path: polygon(20% 0%, 35% 15%, 50% 0%, 65% 15%, 80% 0%, 100% 20%, 85% 35%, 100% 50%, 85% 65%, 100% 80%, 80% 100%, 65% 85%, 50% 100%, 35% 85%, 20% 100%, 0% 80%, 15% 65%, 0% 50%, 15% 35%, 0% 20%);
}
.clip-speech-bubble {
    clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 60% 85%, 40% 100%, 45% 85%, 0% 85%);
}
.bg-rays {
    background: repeating-conic-gradient(from 0deg, #1a1a1a 0deg 15deg, #222 15deg 30deg);
}
</style>
</head>
<body class="m-0 p-0 font-display">
<div id="card" class="relative w-[380px] aspect-[3/4] bg-white dark:bg-[#111] overflow-hidden border-4 border-black">
    <div class="absolute inset-0 bg-halftone opacity-[0.05] pointer-events-none z-10"></div>
    <div class="absolute inset-0 bg-rays opacity-100 z-0"></div>

    <div class="absolute inset-0 z-20 flex flex-col p-4 gap-4">
        <div class="flex flex-row h-1/4 gap-3">
            <div class="w-1/3 relative manga-panel-border bg-black overflow-hidden transform -rotate-2 flex items-center justify-center">
                <span class="text-4xl font-black text-white">{{firstName}}</span>
                <div class="absolute inset-0 bg-halftone-white opacity-40 mix-blend-overlay"></div>
            </div>

            <div class="flex-1 flex flex-col justify-center items-start pl-2 relative">
                <div class="bg-primary px-3 py-1 -rotate-1 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mb-2 inline-block">
                    <span class="text-white text-xs font-black tracking-widest uppercase">#{{rank}} Trending</span>
                </div>
                <h1 class="text-4xl font-black text-white italic tracking-tighter uppercase leading-[0.9] manga-shadow-text transform skew-x-[-10deg]">
                    {{name}}
                </h1>
            </div>
        </div>

        <div class="flex-1 relative flex items-center justify-center">
            <div class="absolute top-0 left-0 z-30 transform -rotate-12 -translate-y-4">
                <div class="bg-primary text-white p-6 clip-burst shadow-lg flex flex-col items-center justify-center size-28">
                    <span class="text-xs font-bold mt-2">RANK</span>
                    <span class="text-3xl font-black italic">#{{rank}}</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full h-full">
                <div class="relative border-4 border-white bg-black/50 backdrop-blur-sm p-4 flex flex-col items-center justify-center transform rotate-1 rounded-sm">
                    <div class="absolute top-[-15px] right-[-10px] bg-white text-black px-2 py-1 text-xs font-bold border-2 border-black rotate-3">
                        STARS
                    </div>
                    <span class="material-symbols-outlined text-primary text-5xl mb-1" style="font-variation-settings: 'FILL' 1;">star</span>
                    <span class="text-4xl font-black text-white tracking-tighter">{{stars}}</span>
                </div>

                <div class="relative border-4 border-white bg-black/50 backdrop-blur-sm p-4 flex flex-col items-center justify-center transform -rotate-1 rounded-sm">
                    <div class="absolute bottom-[-15px] left-[-10px] bg-primary text-white px-2 py-1 text-xs font-bold border-2 border-black -rotate-3 z-10">
                        FORKS
                    </div>
                    <span class="material-symbols-outlined text-white text-5xl mb-1">fork_right</span>
                    <span class="text-4xl font-black text-white tracking-tighter">{{forks}}</span>
                </div>
            </div>
        </div>

        <div class="h-1/4 flex flex-col gap-2">
            <div class="flex items-center gap-2">
                <div class="relative bg-white text-black p-4 pb-6 clip-speech-bubble min-w-[120px]">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full" style="background-color: {{languageColor}};"></span>
                        <p class="text-sm font-black uppercase text-center leading-tight">{{language}}</p>
                    </div>
                </div>

                <div class="flex-1 bg-black border-2 border-white p-2 flex justify-between items-center transform rotate-1 shadow-[4px_4px_0px_#f20d0d]">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-gray-400 uppercase font-bold">Today</span>
                        <span class="text-xl font-bold text-primary">{{todayStars}}</span>
                    </div>
                    <div class="h-8 w-[1px] bg-gray-700"></div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] text-gray-400 uppercase font-bold">Owner</span>
                        <span class="text-sm font-bold text-white">{{owner}}</span>
                    </div>
                </div>
            </div>

            <div class="mt-auto bg-primary/90 text-white p-2 text-center text-xs font-mono tracking-widest border-t-2 border-black line-clamp-1">
                {{description}}
            </div>
        </div>

        <div class="absolute top-2 right-2 size-4 border-t-4 border-r-4 border-white"></div>
        <div class="absolute bottom-2 left-2 size-4 border-b-4 border-l-4 border-white"></div>
    </div>
</div>
</body>
</html>
