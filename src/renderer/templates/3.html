<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Template 3</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "primary": "#f2f20d",
            },
            fontFamily: {
                "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
            },
        },
    },
}
</script>
<style>
.pattern-grid {
    background-image: radial-gradient(#333 1px, transparent 1px);
    background-size: 20px 20px;
}
</style>
</head>
<body class="m-0 p-0 font-display">
<div id="card" class="relative w-[380px] aspect-[3/4] bg-black border-4 border-white shadow-[8px_8px_0px_0px_#f2f20d] flex flex-col p-6 justify-between overflow-hidden">
    <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 bg-white/5 rotate-45 transform translate-y-1/2 -translate-x-1/2"></div>

    <div class="relative z-10 flex items-center gap-3 border-b-2 border-[#333] pb-4">
        <div class="w-12 h-12 bg-white border-2 border-primary overflow-hidden shrink-0 shadow-[2px_2px_0px_0px_#fff] flex items-center justify-center">
            <span class="text-2xl font-bold text-black">{{firstName}}</span>
        </div>
        <div class="flex flex-col">
            <span class="text-gray-400 text-xs font-mono uppercase tracking-widest">Maintainer</span>
            <span class="text-white font-bold text-lg leading-none tracking-tight">{{owner}}</span>
        </div>
        <div class="ml-auto">
            <span class="material-symbols-outlined text-primary text-4xl">code_blocks</span>
        </div>
    </div>

    <div class="relative z-10 flex-1 flex flex-col justify-center gap-4 py-4">
        <div>
            <h2 class="text-5xl font-black text-white leading-[0.85] tracking-tighter uppercase break-words drop-shadow-md">
                {{name}}
            </h2>
        </div>

        <div class="border-l-4 border-primary pl-4 py-1 bg-white/5 backdrop-blur-sm">
            <p class="text-gray-200 text-sm font-mono leading-tight line-clamp-3">
                {{description}}
            </p>
        </div>
    </div>

    <div class="relative z-10 grid grid-cols-2 gap-3 mb-4">
        <div class="border-2 border-white bg-black p-2 flex flex-col items-start shadow-[3px_3px_0px_0px_#f2f20d]">
            <span class="text-[10px] text-primary uppercase font-bold tracking-widest">Stars</span>
            <span class="text-2xl font-bold text-white">{{stars}}</span>
        </div>

        <div class="border-2 border-white bg-black p-2 flex flex-col items-start shadow-[3px_3px_0px_0px_#f2f20d]">
            <span class="text-[10px] text-primary uppercase font-bold tracking-widest">Forks</span>
            <span class="text-2xl font-bold text-white">{{forks}}</span>
        </div>

        <div class="col-span-2 border-2 border-primary bg-primary p-2 flex flex-row items-center justify-between shadow-[3px_3px_0px_0px_#fff]">
            <div class="flex flex-col">
                <span class="text-[10px] text-black uppercase font-black tracking-widest">Trending</span>
                <span class="text-xl font-black text-black leading-none">#{{rank}} TODAY</span>
            </div>
            <span class="material-symbols-outlined text-black">trending_up</span>
        </div>
    </div>

    <div class="relative z-10 flex items-end justify-between border-t-2 border-[#333] pt-4">
        <div class="flex gap-2 flex-wrap">
            <span class="w-3 h-3 rounded-full" style="background-color: {{languageColor}};"></span>
            <span class="px-2 py-1 bg-[#333] text-white text-xs font-mono border border-gray-600">{{language}}</span>
        </div>
        <div class="text-green-400 text-sm font-bold flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">trending_up</span>
            {{todayStars}}
        </div>
    </div>

    <div class="absolute top-2 left-2 w-2 h-2 bg-white"></div>
    <div class="absolute top-2 right-2 w-2 h-2 bg-white"></div>
    <div class="absolute bottom-2 left-2 w-2 h-2 bg-white"></div>
    <div class="absolute bottom-2 right-2 w-2 h-2 bg-white"></div>
</div>
</body>
</html>
