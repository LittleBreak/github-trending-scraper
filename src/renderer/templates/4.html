<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Template 4</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "primary": "#25aff4",
            },
            fontFamily: {
                "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
            },
        },
    },
}
</script>
<style>
.shadow-glow {
    box-shadow: 0 0 15px rgba(37, 175, 244, 0.5);
}
.shadow-glow-sm {
    box-shadow: 0 0 8px rgba(37, 175, 244, 0.4);
}
.text-glow {
    text-shadow: 0 0 10px rgba(37, 175, 244, 0.6);
}
</style>
</head>
<body class="m-0 p-0 font-display">
<div id="card" class="relative w-[380px] aspect-[3/4] bg-[#0b1021] rounded-xl overflow-hidden border border-[#1e2d36]">
    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#25aff4 1px, transparent 1px); background-size: 20px 20px;"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-[#0b1021]/50 via-transparent to-[#0b1021] pointer-events-none"></div>

    <div class="absolute top-8 left-0 w-12 h-[2px] bg-primary/40"></div>
    <div class="absolute top-8 left-12 w-[2px] h-12 bg-primary/40"></div>
    <div class="absolute top-20 left-12 w-8 h-[2px] bg-primary/40"></div>
    <div class="absolute top-[78px] left-[78px] w-2 h-2 rounded-full bg-primary shadow-glow-sm"></div>

    <div class="absolute top-12 right-0 w-16 h-[2px] bg-primary/40"></div>
    <div class="absolute top-12 right-16 w-[2px] h-8 bg-primary/40"></div>
    <div class="absolute top-20 right-16 w-8 h-[2px] bg-primary/40"></div>
    <div class="absolute top-[78px] right-[94px] w-2 h-2 rounded-full bg-primary shadow-glow-sm"></div>

    <div class="absolute bottom-32 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[1px] h-32 bg-primary/20"></div>

    <div class="relative z-10 flex flex-col h-full p-6">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm">memory</span>
                <span class="text-[10px] font-bold tracking-[0.2em] text-primary/80 uppercase">#{{rank}} Trending</span>
            </div>
            <div class="px-2 py-0.5 rounded border border-primary/30 bg-primary/10">
                <span class="w-2 h-2 rounded-full inline-block" style="background-color: {{languageColor}};"></span>
                <span class="text-[10px] font-mono text-primary">{{language}}</span>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[140%] border border-dashed border-primary/10 rounded-full"></div>

            <div class="relative bg-[#0f1823] border border-primary/60 p-6 w-full rounded-lg shadow-glow backdrop-blur-sm flex flex-col items-center gap-4 z-20">
                <div class="absolute -top-[1px] -left-[1px] w-3 h-3 border-t-2 border-l-2 border-primary"></div>
                <div class="absolute -top-[1px] -right-[1px] w-3 h-3 border-t-2 border-r-2 border-primary"></div>
                <div class="absolute -bottom-[1px] -left-[1px] w-3 h-3 border-b-2 border-l-2 border-primary"></div>
                <div class="absolute -bottom-[1px] -right-[1px] w-3 h-3 border-b-2 border-r-2 border-primary"></div>

                <div class="relative">
                    <div class="absolute inset-0 rounded-full bg-primary blur-md opacity-40"></div>
                    <div class="w-20 h-20 rounded-full border-2 border-primary relative z-10 bg-black flex items-center justify-center">
                        <span class="text-3xl font-bold text-white">{{firstName}}</span>
                    </div>
                </div>

                <div class="text-center">
                    <h1 class="text-3xl font-bold text-white tracking-tight text-glow">{{name}}</h1>
                    <p class="text-primary/80 text-sm font-medium tracking-wide mt-1">{{owner}}</p>
                </div>

                <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-primary/50 to-transparent my-1"></div>

                <p class="text-xs text-center text-gray-400 leading-relaxed line-clamp-2">
                    {{description}}
                </p>
            </div>
        </div>

        <div class="mt-auto pt-8">
            <div class="flex gap-3 justify-between">
                <div class="flex-1 bg-[#131f2b] border border-primary/30 p-2 rounded relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-[2px] bg-primary/50"></div>
                    <div class="flex flex-col items-center gap-1 z-10 relative">
                        <span class="material-symbols-outlined text-primary text-base">star</span>
                        <span class="text-lg font-bold text-white">{{stars}}</span>
                        <span class="text-[9px] uppercase tracking-widest text-gray-500">Stars</span>
                    </div>
                </div>

                <div class="flex-1 bg-[#131f2b] border border-primary/30 p-2 rounded relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-[2px] bg-primary/50"></div>
                    <div class="flex flex-col items-center gap-1 z-10 relative">
                        <span class="material-symbols-outlined text-primary text-base">fork_right</span>
                        <span class="text-lg font-bold text-white">{{forks}}</span>
                        <span class="text-[9px] uppercase tracking-widest text-gray-500">Forks</span>
                    </div>
                </div>

                <div class="flex-1 bg-[#131f2b] border border-primary/30 p-2 rounded relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-[2px] bg-primary/50"></div>
                    <div class="flex flex-col items-center gap-1 z-10 relative">
                        <span class="material-symbols-outlined text-primary text-base">trending_up</span>
                        <span class="text-lg font-bold text-white">{{todayStars}}</span>
                        <span class="text-[9px] uppercase tracking-widest text-gray-500">Today</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
