<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Template 7</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "primary": "#137fec",
                "background-dark": "#101922",
            },
            fontFamily: {
                "display": ["Inter", "Noto Sans SC", "sans-serif"]
            },
        },
    },
}
</script>
<style>
.neon-stroke {
    filter: drop-shadow(0 0 6px rgba(19, 127, 236, 0.6));
}
</style>
</head>
<body class="m-0 p-0 font-display">
<div id="card" class="relative w-[380px] aspect-[3/4] bg-background-dark rounded-xl overflow-hidden flex flex-col border border-white/5">
    <div class="absolute -right-12 -top-10 z-0 pointer-events-none select-none">
        <span class="text-[300px] font-black leading-none text-white opacity-[0.03]">#{{rank}}</span>
    </div>

    <div class="relative z-10 flex flex-col h-full p-6 md:p-8">
        <div class="flex flex-col gap-6 mb-8">
            <div class="flex items-center gap-4">
                <div class="h-16 w-16 rounded-full bg-gray-800 border-2 border-white/10 shadow-lg flex items-center justify-center">
                    <span class="text-2xl font-bold text-white">{{firstName}}</span>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-2xl font-bold text-white tracking-tight">{{owner}}/{{name}}</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="material-symbols-outlined text-primary text-[18px]">verified</span>
                        <span class="text-xs uppercase tracking-wider text-primary font-bold">#{{rank}} Trending</span>
                    </div>
                </div>
            </div>
            <p class="text-gray-400 text-sm leading-relaxed line-clamp-2">
                {{description}}
            </p>
        </div>

        <div class="flex flex-col bg-white/5 border border-white/5 rounded-lg p-5 mb-6 backdrop-blur-sm shadow-lg relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
            <div class="flex justify-between items-end mb-4 relative z-10">
                <div>
                    <p class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 font-semibold">Today's Growth</p>
                    <div class="flex items-baseline gap-2">
                        <span class="text-4xl font-bold text-white tracking-tight">{{todayStars}}</span>
                        <span class="text-sm font-medium text-primary flex items-center">
                            <span class="material-symbols-outlined text-base mr-0.5">trending_up</span>
                            Stars
                        </span>
                    </div>
                </div>
            </div>

            <div class="relative h-16 w-full">
                <svg class="w-full h-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 478 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
                            <stop offset="0%" stop-color="#137fec" stop-opacity="0.3"></stop>
                            <stop offset="100%" stop-color="#137fec" stop-opacity="0"></stop>
                        </linearGradient>
                    </defs>
                    <path d="M0 70C40 70 40 20 80 20C120 20 120 40 160 40C200 40 200 60 240 60C280 60 280 30 320 30C360 30 360 50 400 50C440 50 440 15 478 15V100H0V70Z" fill="url(#chartGradient)"></path>
                    <path class="neon-stroke" d="M0 70C40 70 40 20 80 20C120 20 120 40 160 40C200 40 200 60 240 60C280 60 280 30 320 30C360 30 360 50 400 50C440 50 440 15 478 15" fill="none" stroke="#137fec" stroke-linecap="round" stroke-width="3"></path>
                </svg>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-px bg-white/10 border border-white/10 rounded-lg overflow-hidden flex-1 mb-4">
            <div class="bg-background-dark/95 backdrop-blur-sm p-4 flex flex-col justify-center">
                <div class="flex items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-[16px] text-gray-500">star</span>
                    <span class="text-[10px] uppercase tracking-[0.15em] text-gray-500 font-medium">Total Stars</span>
                </div>
                <span class="text-xl font-bold text-white">{{stars}}</span>
            </div>

            <div class="bg-background-dark/95 backdrop-blur-sm p-4 flex flex-col justify-center">
                <div class="flex items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-[16px] text-gray-500">fork_right</span>
                    <span class="text-[10px] uppercase tracking-[0.15em] text-gray-500 font-medium">Forks</span>
                </div>
                <span class="text-xl font-bold text-white">{{forks}}</span>
            </div>

            <div class="bg-background-dark/95 backdrop-blur-sm p-4 flex flex-col justify-center">
                <div class="flex items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-[16px] text-gray-500">code</span>
                    <span class="text-[10px] uppercase tracking-[0.15em] text-gray-500 font-medium">Language</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full" style="background-color: {{languageColor}};"></span>
                    <span class="text-lg font-bold text-white truncate">{{language}}</span>
                </div>
            </div>

            <div class="bg-background-dark/95 backdrop-blur-sm p-4 flex flex-col justify-center">
                <div class="flex items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-[16px] text-gray-500">trending_up</span>
                    <span class="text-[10px] uppercase tracking-[0.15em] text-gray-500 font-medium">Rank</span>
                </div>
                <span class="text-xl font-bold text-white">#{{rank}}</span>
            </div>
        </div>

        <div class="flex justify-between items-center pt-2">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 rounded bg-white flex items-center justify-center text-background-dark">
                    <span class="material-symbols-outlined text-xl">bar_chart</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-white font-bold text-sm leading-none">GitHub Stats</span>
                    <span class="text-[10px] text-gray-500 mt-1 uppercase tracking-wider">Daily Report</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
