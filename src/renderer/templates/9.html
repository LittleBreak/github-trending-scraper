<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Template 9</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                "primary": "#7f13ec",
            },
            fontFamily: {
                "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"],
            },
        },
    },
}
</script>
<style>
.glass-panel {
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
}
.glass-pill {
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.4);
}
.mesh-gradient-bg {
    background-color: #f7f6f8;
    background-image:
        radial-gradient(at 0% 0%, hsla(276,68%,68%,1) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(189,68%,78%,1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(333,68%,78%,1) 0, transparent 50%),
        radial-gradient(at 0% 100%, hsla(262,72%,73%,1) 0, transparent 50%),
        radial-gradient(at 80% 100%, hsla(273,65%,48%,0.4) 0, transparent 50%),
        radial-gradient(at 0% 50%, hsla(196,65%,73%,1) 0, transparent 50%);
}
</style>
</head>
<body class="m-0 p-0 font-display">
<div id="card" class="relative w-[380px] aspect-[3/4] mesh-gradient-bg">
    <div class="glass-panel h-full w-full p-6 flex flex-col justify-between relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 blur-2xl rounded-full pointer-events-none"></div>

        <div class="flex flex-col gap-4 relative z-10">
            <div class="flex items-center gap-3">
                <div class="size-12 rounded-full bg-white shadow-sm overflow-hidden border-2 border-white/50 flex items-center justify-center">
                    <span class="text-2xl font-bold text-[#734c9a]">{{firstName}}</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xs font-semibold uppercase tracking-wider text-[#734c9a] opacity-80">#{{rank}} Trending</span>
                    <h3 class="text-2xl font-extrabold text-[#140d1b] leading-tight">{{owner}} / {{name}}</h3>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-center py-4 relative z-10">
            <div class="glass-pill p-4 rounded-xl">
                <div class="flex items-center gap-2 mb-2">
                    <span class="material-symbols-outlined text-primary text-sm">code</span>
                    <span class="w-2 h-2 rounded-full" style="background-color: {{languageColor}};"></span>
                    <span class="text-xs font-bold text-primary">{{language}}</span>
                </div>
                <p class="text-[#140d1b]/80 text-lg font-medium leading-relaxed font-display line-clamp-3">
                    {{description}}
                </p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 relative z-10">
            <div class="glass-pill p-3 rounded-xl flex flex-col items-start gap-1">
                <div class="flex items-center gap-1 text-[#734c9a]">
                    <span class="material-symbols-outlined text-sm">star</span>
                    <span class="text-xs font-bold uppercase tracking-wider">Stars</span>
                </div>
                <p class="text-2xl font-extrabold text-[#140d1b]">{{stars}}</p>
            </div>
            <div class="glass-pill p-3 rounded-xl flex flex-col items-start gap-1">
                <div class="flex items-center gap-1 text-[#734c9a]">
                    <span class="material-symbols-outlined text-sm">fork_right</span>
                    <span class="text-xs font-bold uppercase tracking-wider">Forks</span>
                </div>
                <p class="text-2xl font-extrabold text-[#140d1b]">{{forks}}</p>
            </div>
            <div class="col-span-2 glass-pill p-3 rounded-xl flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 rounded-full bg-green-400/20 text-green-700">
                        <span class="material-symbols-outlined text-sm block">trending_up</span>
                    </div>
                    <span class="text-sm font-medium text-[#140d1b]">Today's Activity</span>
                </div>
                <p class="text-xl font-extrabold text-[#140d1b]">{{todayStars}}</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
