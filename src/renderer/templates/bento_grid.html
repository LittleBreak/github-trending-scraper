<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Share Card Bento Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
        },
      },
    }
  </script>
</head>
<body class="bg-[#101922] font-display m-0 p-0">
  <div id="card" class="relative w-[380px] aspect-[3/4] overflow-hidden flex flex-col p-4 gap-3">
    <!-- Card Background -->
    <div class="absolute inset-0 bg-gradient-to-br from-[#1e293b] via-[#0f172a] to-[#020617] z-0"></div>
    <!-- Decorative Glows -->
    <div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/30 rounded-full blur-[80px] z-0"></div>
    <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/80 to-transparent z-0"></div>

    <!-- Bento Grid Content -->
    <div class="relative z-10 flex flex-col h-full gap-3">
      <!-- Header Tile -->
      <div class="flex-shrink-0 bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-4 flex items-center gap-4">
        <div class="relative shrink-0">
          <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-white/20 bg-slate-700 flex items-center justify-center">
            <span class="text-white text-2xl font-bold">{{firstName}}</span>
          </div>
          <!-- Rank Badge -->
          <div class="absolute -top-1 -right-1 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full w-6 h-6 flex items-center justify-center shadow-lg shadow-orange-500/30 border border-white/20">
            <span class="text-white text-xs font-bold">#{{rank}}</span>
          </div>
        </div>
        <div class="flex flex-col min-w-0 flex-1">
          <h1 class="text-white text-xl font-bold truncate">{{owner}} / {{name}}</h1>
          <div class="flex items-center gap-1.5 mt-1.5">
            <span class="material-symbols-outlined text-slate-400 text-[14px]">link</span>
            <span class="text-slate-400 text-xs truncate">github.com/{{owner}}/{{name}}</span>
          </div>
        </div>
      </div>

      <!-- Description Tile -->
      <div class="flex-shrink-0 bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-5 flex flex-col justify-center min-h-[100px]">
        <p class="text-slate-200 text-base leading-relaxed font-normal line-clamp-3">
          {{description}}
        </p>
      </div>

      <!-- Metrics Grid (2x2) -->
      <div class="flex-1 grid grid-cols-2 gap-3 min-h-0">
        <!-- Stars -->
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-4 flex flex-col justify-between">
          <div class="flex justify-between items-start">
            <span class="text-slate-400 text-sm font-medium">Total Stars</span>
            <div class="p-1.5 rounded-md bg-yellow-500/10 text-yellow-500">
              <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">star</span>
            </div>
          </div>
          <p class="text-white text-2xl font-bold">{{stars}}</p>
        </div>

        <!-- Forks -->
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-4 flex flex-col justify-between">
          <div class="flex justify-between items-start">
            <span class="text-slate-400 text-sm font-medium">Forks</span>
            <div class="p-1.5 rounded-md bg-purple-500/10 text-purple-400">
              <span class="material-symbols-outlined text-[20px]">call_split</span>
            </div>
          </div>
          <p class="text-white text-2xl font-bold">{{forks}}</p>
        </div>

        <!-- Language -->
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-4 flex flex-col justify-between">
          <div class="flex justify-between items-start">
            <span class="text-slate-400 text-sm font-medium">Language</span>
            <div class="p-1.5 rounded-md bg-blue-500/10 text-blue-400">
              <span class="material-symbols-outlined text-[20px]">code_blocks</span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="size-3 rounded-full shadow-[0_0_8px_rgba(96,165,250,0.6)]" style="background-color: {{languageColor}};"></span>
            <p class="text-white text-xl font-bold truncate">{{language}}</p>
          </div>
        </div>

        <!-- Trending -->
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-4 flex flex-col justify-between relative overflow-hidden">
          <div class="absolute -bottom-4 -right-4 w-16 h-16 bg-primary/20 blur-xl rounded-full"></div>
          <div class="flex justify-between items-start relative z-10">
            <span class="text-slate-400 text-sm font-medium">Today</span>
            <div class="p-1.5 rounded-md bg-green-500/10 text-green-400">
              <span class="material-symbols-outlined text-[20px]">trending_up</span>
            </div>
          </div>
          <div class="relative z-10">
            <p class="text-white text-2xl font-bold">{{todayStars}}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
