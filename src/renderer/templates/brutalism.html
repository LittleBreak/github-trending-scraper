<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Brutalism</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#f2f20d",
          },
          fontFamily: {
            "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .pattern-grid {
      background-image: radial-gradient(#333 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-[#222210] pattern-grid flex items-center justify-center font-display">
    <div class="relative w-[960px] h-[1280px] bg-black border-8 border-white shadow-[16px_16px_0px_0px_#f2f20d] flex flex-col p-12 justify-between overflow-hidden">
      <!-- Background Elements -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-primary/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>

      <!-- Card Header: Author -->
      <div class="relative z-10 flex items-center gap-6 border-b-4 border-[#333] pb-8">
        <div class="w-20 h-20 bg-white border-4 border-primary overflow-hidden shadow-[4px_4px_0px_0px_#fff] flex items-center justify-center">
          <span class="text-black text-4xl font-black">{{rank}}</span>
        </div>
        <div class="flex flex-col">
          <span class="text-gray-400 text-sm font-mono uppercase tracking-widest">Maintainer</span>
          <span class="text-white font-bold text-3xl leading-none tracking-tight">{{owner}}</span>
        </div>
        <div class="ml-auto">
          <span class="material-symbols-outlined text-primary text-6xl">code_blocks</span>
        </div>
      </div>

      <!-- Card Body: Main Info -->
      <div class="relative z-10 flex-1 flex flex-col justify-center gap-8 py-8">
        <!-- Title -->
        <div>
          <h2 class="text-8xl font-black text-white leading-[0.85] tracking-tighter uppercase break-words drop-shadow-md">
            {{name}}
          </h2>
        </div>
        <!-- Description -->
        <div class="border-l-8 border-primary pl-6 py-2 bg-white/5 backdrop-blur-sm">
          <p class="text-gray-200 text-xl font-mono leading-tight">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Card Stats Grid -->
      <div class="relative z-10 grid grid-cols-2 gap-6 mb-8">
        <div class="border-4 border-white bg-black p-4 flex flex-col items-start shadow-[6px_6px_0px_0px_#f2f20d]">
          <span class="text-sm text-primary uppercase font-bold tracking-widest">Stars</span>
          <span class="text-4xl font-bold text-white">{{stars}}</span>
        </div>
        <div class="border-4 border-white bg-black p-4 flex flex-col items-start shadow-[6px_6px_0px_0px_#f2f20d]">
          <span class="text-sm text-primary uppercase font-bold tracking-widest">Forks</span>
          <span class="text-4xl font-bold text-white">{{forks}}</span>
        </div>
        <div class="col-span-2 border-4 border-primary bg-primary p-4 flex flex-row items-center justify-between shadow-[6px_6px_0px_0px_#fff]">
          <div class="flex flex-col">
            <span class="text-sm text-black uppercase font-black tracking-widest">Global Rank</span>
            <span class="text-3xl font-black text-black leading-none">TOP #{{rank}} TRENDING</span>
          </div>
          <span class="material-symbols-outlined text-black text-4xl">trending_up</span>
        </div>
      </div>

      <!-- Card Footer -->
      <div class="relative z-10 flex items-end justify-between border-t-4 border-[#333] pt-6">
        <div class="flex gap-4 flex-wrap">
          <span class="px-4 py-2 bg-[#333] text-white text-lg font-mono border-2 border-gray-600 flex items-center gap-2">
            <span class="w-4 h-4 rounded-full" style="background-color: {{languageColor}}"></span>
            {{language}}
          </span>
          <span class="px-4 py-2 bg-[#333] text-primary text-lg font-mono border-2 border-gray-600">
            {{todayStars}}
          </span>
        </div>
      </div>

      <!-- Decorative corner accents -->
      <div class="absolute top-4 left-4 w-4 h-4 bg-white"></div>
      <div class="absolute top-4 right-4 w-4 h-4 bg-white"></div>
      <div class="absolute bottom-4 left-4 w-4 h-4 bg-white"></div>
      <div class="absolute bottom-4 right-4 w-4 h-4 bg-white"></div>
    </div>
  </div>
</body>
</html>
