<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Claymorphism</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#42f099",
            "clay-white": "#f0f4f8",
            "clay-mint": "#e0f7ef",
            "clay-lavender": "#eef2ff",
            "clay-peach": "#fff1eb",
          },
          fontFamily: {
            "display": ["Spline Sans", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .clay-card {
      box-shadow: 12px 12px 24px rgba(170, 180, 190, 0.4), -12px -12px 24px rgba(255, 255, 255, 1), inset -4px -4px 8px rgba(170, 180, 190, 0.1), inset 4px 4px 8px rgba(255, 255, 255, 0.8);
    }
    .clay-pill {
      box-shadow: 6px 6px 12px rgba(170, 180, 190, 0.3), -6px -6px 12px rgba(255, 255, 255, 1), inset 2px 2px 4px rgba(255, 255, 255, 0.8), inset -2px -2px 4px rgba(0, 0, 0, 0.05);
    }
    .clay-convex {
      box-shadow: inset 4px 4px 8px rgba(255, 255, 255, 1), inset -4px -4px 8px rgba(0, 0, 0, 0.05), 8px 8px 16px rgba(170, 180, 190, 0.2);
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] flex flex-col items-center justify-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 font-display relative p-12">
    <!-- Background decorative blobs -->
    <div class="absolute top-[-40px] left-[-40px] w-64 h-64 bg-primary/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-40px] right-[-40px] w-80 h-80 bg-purple-300/20 rounded-full blur-3xl"></div>

    <!-- THE CLAY CARD -->
    <div class="relative z-10 w-full h-full flex flex-col bg-clay-white rounded-[48px] clay-card p-12 overflow-hidden">
      <!-- Decorative Gloss -->
      <div class="absolute top-8 left-8 w-3/4 h-3/4 bg-gradient-to-br from-white/80 to-transparent rounded-full opacity-40 blur-3xl pointer-events-none"></div>

      <!-- Profile Avatar -->
      <div class="relative flex justify-center -mt-4 mb-8">
        <div class="relative p-4 rounded-full bg-clay-white clay-pill">
          <div class="w-40 h-40 rounded-full overflow-hidden border-8 border-clay-white shadow-inner flex items-center justify-center bg-gradient-to-br from-primary to-emerald-400">
            <span class="text-white text-6xl font-bold">{{rank}}</span>
          </div>
          <!-- Badge -->
          <div class="absolute bottom-4 right-4 w-10 h-10 bg-primary rounded-full border-4 border-white shadow-sm flex items-center justify-center">
            <span class="material-symbols-outlined text-xl text-white">check</span>
          </div>
        </div>
      </div>

      <!-- Header Text -->
      <div class="flex flex-col items-center text-center mb-12 z-10">
        <h1 class="text-[#2d3748] text-4xl font-bold tracking-tight mb-2">{{owner}} / {{name}}</h1>
        <div class="flex items-center gap-2 opacity-70">
          <span class="material-symbols-outlined text-lg text-[#4c9a73]">trending_up</span>
          <span class="text-[#4c9a73] text-sm font-medium uppercase tracking-wide">Trending #{{rank}}</span>
        </div>
      </div>

      <!-- Description -->
      <div class="flex-1 flex flex-col items-center justify-start text-center mb-12 z-10 relative">
        <div class="bg-[#eef2f6] rounded-3xl p-8 shadow-[inset_2px_2px_5px_rgba(0,0,0,0.05),inset_-2px_-2px_5px_rgba(255,255,255,1)] w-full">
          <p class="text-slate-600 text-xl font-medium leading-relaxed">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Language Chip -->
      <div class="flex justify-center mb-12 z-10">
        <div class="flex items-center gap-4 px-8 py-4 bg-clay-mint rounded-full clay-pill text-[#0f5132]">
          <span class="w-5 h-5 rounded-full shadow-[0_0_8px_#42f099]" style="background-color: {{languageColor}}"></span>
          <span class="text-xl font-bold">{{language}}</span>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="flex items-center justify-between gap-6 w-full mt-auto z-10">
        <!-- Stars -->
        <div class="flex flex-col items-center justify-center flex-1 h-32 bg-clay-white rounded-3xl clay-convex">
          <span class="material-symbols-outlined text-amber-400 mb-2 text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
          <span class="text-slate-700 font-bold text-2xl">{{stars}}</span>
          <span class="text-slate-400 text-sm uppercase font-bold tracking-wider">Stars</span>
        </div>
        <!-- Forks -->
        <div class="flex flex-col items-center justify-center flex-1 h-32 bg-clay-lavender rounded-3xl clay-convex">
          <span class="material-symbols-outlined text-purple-400 mb-2 text-4xl" style="font-variation-settings: 'FILL' 1;">call_split</span>
          <span class="text-slate-700 font-bold text-2xl">{{forks}}</span>
          <span class="text-slate-400 text-sm uppercase font-bold tracking-wider">Forks</span>
        </div>
        <!-- Today -->
        <div class="flex flex-col items-center justify-center flex-1 h-32 bg-clay-peach rounded-3xl clay-convex">
          <span class="material-symbols-outlined text-orange-400 mb-2 text-4xl">trending_up</span>
          <span class="text-slate-700 font-bold text-2xl">{{todayStars}}</span>
          <span class="text-slate-400 text-sm uppercase font-bold tracking-wider">Today</span>
        </div>
      </div>
    </div>

    <!-- Watermark -->
    <div class="absolute bottom-6 text-center w-full opacity-40">
      <p class="text-sm font-bold tracking-widest text-slate-500 uppercase flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-base">code</span> Generated by GitClay
      </p>
    </div>
  </div>
</body>
</html>
