<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Cyberpunk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#f20d80",
            "secondary": "#00f3ff",
          },
          fontFamily: {
            "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .tech-border {
      position: relative;
      background: rgba(20, 20, 20, 0.6);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .scanlines {
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
      background-size: 100% 4px;
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-[#050505] overflow-hidden font-display text-white relative">
    <!-- Cyberpunk Background Layers -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(242,13,128,0.15),transparent_70%)]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_100%_100%,rgba(0,243,255,0.1),transparent_50%)]"></div>
    <div class="absolute inset-0 scanlines opacity-30 pointer-events-none z-20"></div>

    <!-- Giant Background Rank Number -->
    <div class="absolute top-20 left-1/2 -translate-x-1/2 text-[300px] leading-none font-black text-white/[0.03] select-none pointer-events-none tracking-tighter z-0">
      #{{rank}}
    </div>

    <!-- Card Content -->
    <div class="relative z-10 flex flex-col h-full p-12 justify-between">
      <!-- Header -->
      <div class="flex flex-col items-center gap-8 pt-8">
        <!-- Avatar with Glow -->
        <div class="relative">
          <div class="absolute -inset-2 rounded-2xl bg-gradient-to-r from-primary to-secondary opacity-70 blur-lg animate-pulse"></div>
          <div class="relative h-40 w-40 rounded-2xl bg-gray-900 border-2 border-white/20 p-2 flex items-center justify-center">
            <span class="text-6xl font-black text-primary">{{rank}}</span>
          </div>
          <!-- Rank Badge -->
          <div class="absolute -bottom-4 -right-4 bg-black border border-primary text-primary px-3 py-1 text-sm font-bold rounded flex items-center gap-2 shadow-[0_0_10px_rgba(242,13,128,0.5)]">
            <span class="material-symbols-outlined text-lg">trophy</span>
            <span>TOP {{rank}}</span>
          </div>
        </div>

        <!-- Titles -->
        <div class="text-center space-y-2">
          <h1 class="text-5xl font-bold text-white tracking-tighter drop-shadow-[0_0_8px_rgba(242,13,128,0.6)]">
            {{owner}}<span class="text-primary">/</span>{{name}}
          </h1>
          <div class="flex items-center justify-center gap-3 text-secondary text-lg font-medium tracking-widest uppercase opacity-80">
            <span class="material-symbols-outlined text-xl">verified</span>
            Trending Repository
          </div>
        </div>
      </div>

      <!-- Description Box -->
      <div class="relative my-8">
        <div class="tech-border border-l-4 border-primary/50 border-r-4 border-secondary/50 p-8 backdrop-blur-sm">
          <div class="absolute -top-4 left-6 bg-[#050505] px-3 text-xs text-primary font-bold uppercase tracking-wider border border-primary/30 rounded-sm py-1">
            System.Description
          </div>
          <p class="text-gray-300 text-xl leading-relaxed font-light text-center">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-3 gap-6 mb-4">
        <!-- Stars -->
        <div class="flex flex-col items-center justify-center p-6 rounded-xl border border-primary/30 bg-primary/5 shadow-[0_0_15px_rgba(242,13,128,0.15)]">
          <span class="material-symbols-outlined text-primary mb-2 text-4xl">star</span>
          <span class="text-white font-bold text-3xl leading-tight">{{stars}}</span>
          <span class="text-sm text-primary/80 uppercase tracking-wider">Stars</span>
        </div>
        <!-- Forks -->
        <div class="flex flex-col items-center justify-center p-6 rounded-xl border border-secondary/30 bg-secondary/5 shadow-[0_0_15px_rgba(0,243,255,0.15)]">
          <span class="material-symbols-outlined text-secondary mb-2 text-4xl">account_tree</span>
          <span class="text-white font-bold text-3xl leading-tight">{{forks}}</span>
          <span class="text-sm text-secondary/80 uppercase tracking-wider">Forks</span>
        </div>
        <!-- Language -->
        <div class="flex flex-col items-center justify-center p-6 rounded-xl border border-white/20 bg-white/5">
          <span class="w-5 h-5 rounded-full mb-2" style="background-color: {{languageColor}}"></span>
          <span class="text-white font-bold text-2xl leading-tight">{{language}}</span>
          <span class="text-sm text-gray-400 uppercase tracking-wider">Lang</span>
        </div>
      </div>

      <!-- Today Stats -->
      <div class="flex items-center justify-center gap-4 p-4 border-t border-white/10">
        <span class="material-symbols-outlined text-green-400 text-3xl">trending_up</span>
        <span class="text-2xl font-bold text-green-400">{{todayStars}}</span>
      </div>

      <!-- Footer -->
      <div class="flex justify-between items-end pt-4 mt-2">
        <div class="flex gap-3">
          <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
          <div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
          <div class="w-2 h-2 rounded-full bg-white animate-pulse"></div>
        </div>
        <div class="text-sm text-gray-500 font-mono">
          GENERATED_VIA <span class="text-white font-bold">GITCARD</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
