<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Share Card Cyberpunk</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f20d80",
            "secondary": "#00f3ff",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .tech-border {
      position: relative;
      background: rgba(20, 20, 20, 0.6);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .scanlines {
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
      background-size: 100% 4px;
    }
    .shadow-neon-pink { box-shadow: 0 0 10px rgba(242, 13, 128, 0.5), 0 0 20px rgba(242, 13, 128, 0.3); }
  </style>
</head>
<body class="bg-[#12080d] text-white font-display m-0 p-0">
  <div id="card" class="relative w-[380px] aspect-[3/4] bg-[#050505] overflow-hidden">
    <!-- Background Layers -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(242,13,128,0.15),transparent_70%)]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_100%_100%,rgba(0,243,255,0.1),transparent_50%)]"></div>
    <div class="absolute inset-0 scanlines opacity-30 pointer-events-none z-20"></div>

    <!-- Giant Background Rank Number -->
    <div class="absolute top-10 left-1/2 -translate-x-1/2 text-[180px] leading-none font-black text-white/[0.03] select-none pointer-events-none tracking-tighter whitespace-nowrap z-0">
      #{{rank}}
    </div>

    <!-- Card Content -->
    <div class="relative z-10 flex flex-col h-full p-6 justify-between">
      <!-- Header -->
      <div class="flex flex-col items-center gap-5 pt-4">
        <!-- Avatar with Glow -->
        <div class="relative">
          <div class="absolute -inset-1 rounded-xl bg-gradient-to-r from-primary to-secondary opacity-70 blur-md"></div>
          <div class="relative h-24 w-24 rounded-xl bg-gray-900 border-2 border-white/20 flex items-center justify-center">
            <span class="text-white text-4xl font-bold">{{firstName}}</span>
          </div>
          <!-- Rank Badge -->
          <div class="absolute -bottom-3 -right-3 bg-black border border-primary text-primary px-2 py-0.5 text-xs font-bold rounded flex items-center gap-1 shadow-neon-pink">
            <span class="material-symbols-outlined text-[14px]">trophy</span>
            <span>#{{rank}}</span>
          </div>
        </div>
        <!-- Titles -->
        <div class="text-center space-y-1">
          <h1 class="text-3xl font-bold text-white tracking-tighter drop-shadow-[0_0_8px_rgba(242,13,128,0.6)]">
            {{owner}}<span class="text-primary">/</span>{{name}}
          </h1>
          <div class="flex items-center justify-center gap-2 text-secondary text-sm font-medium tracking-widest uppercase opacity-80">
            <span class="material-symbols-outlined text-[16px]">verified</span>
            Trending Repository
          </div>
        </div>
      </div>

      <!-- Description Box -->
      <div class="relative my-4">
        <div class="tech-border border-l-2 border-primary/50 border-r-2 border-secondary/50 p-5 backdrop-blur-sm">
          <div class="absolute -top-3 left-4 bg-[#050505] px-2 text-[10px] text-primary font-bold uppercase tracking-wider border border-primary/30 rounded-sm">
            System.Description
          </div>
          <p class="text-gray-300 text-sm leading-relaxed font-light text-center line-clamp-3">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-3 gap-3 mb-2">
        <div class="flex flex-col items-center justify-center p-3 rounded-lg border border-primary/30 bg-primary/5 shadow-[0_0_15px_rgba(242,13,128,0.15)]">
          <span class="material-symbols-outlined text-primary mb-1 text-[24px]">star</span>
          <span class="text-white font-bold text-lg leading-tight">{{stars}}</span>
          <span class="text-[10px] text-primary/80 uppercase tracking-wider">Stars</span>
        </div>
        <div class="flex flex-col items-center justify-center p-3 rounded-lg border border-secondary/30 bg-secondary/5 shadow-[0_0_15px_rgba(0,243,255,0.15)]">
          <span class="material-symbols-outlined text-secondary mb-1 text-[24px]">account_tree</span>
          <span class="text-white font-bold text-lg leading-tight">{{forks}}</span>
          <span class="text-[10px] text-secondary/80 uppercase tracking-wider">Forks</span>
        </div>
        <div class="flex flex-col items-center justify-center p-3 rounded-lg border border-white/20 bg-white/5">
          <span class="material-symbols-outlined text-purple-400 mb-1 text-[24px]">code</span>
          <span class="text-white font-bold text-lg leading-tight truncate w-full text-center">{{language}}</span>
          <span class="text-[10px] text-gray-400 uppercase tracking-wider">Lang</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="flex justify-between items-end border-t border-white/10 pt-4 mt-2">
        <div class="flex gap-2">
          <div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-white"></div>
        </div>
        <div class="text-[10px] text-gray-500 font-mono flex items-center gap-1">
          TODAY <span class="text-white font-bold">+{{todayStars}}</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
