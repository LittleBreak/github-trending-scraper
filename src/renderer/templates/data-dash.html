<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Data Dash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "background-dark": "#101922",
          },
          fontFamily: {
            "display": ["Inter", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .neon-stroke {
      filter: drop-shadow(0 0 6px rgba(19, 127, 236, 0.6));
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-background-dark overflow-hidden flex flex-col border border-white/5 font-display relative">
    <!-- Background Watermark: Rank -->
    <div class="absolute -right-20 -top-16 z-0 pointer-events-none select-none">
      <span class="text-[500px] font-black leading-none text-white opacity-[0.03]">#{{rank}}</span>
    </div>

    <!-- Content Layer -->
    <div class="relative z-10 flex flex-col h-full p-12">
      <!-- Header Section -->
      <div class="flex flex-col gap-8 mb-12">
        <div class="flex items-center gap-6">
          <div class="h-24 w-24 rounded-full bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center text-white text-4xl font-bold shadow-lg">
            {{rank}}
          </div>
          <div class="flex flex-col">
            <h1 class="text-4xl font-bold text-white tracking-tight">{{owner}}/{{name}}</h1>
            <div class="flex items-center gap-3 mt-2">
              <span class="material-symbols-outlined text-primary text-2xl">verified</span>
              <span class="text-sm uppercase tracking-wider text-primary font-bold">Official Repository</span>
            </div>
          </div>
        </div>
        <p class="text-gray-400 text-xl leading-relaxed">
          {{description}}
        </p>
      </div>

      <!-- Growth Visualization Section -->
      <div class="flex flex-col bg-white/5 border border-white/5 rounded-xl p-8 mb-8 backdrop-blur-sm shadow-lg relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
        <div class="flex justify-between items-end mb-6 relative z-10">
          <div>
            <p class="text-sm uppercase tracking-[0.2em] text-gray-400 mb-2 font-semibold">Today's Growth</p>
            <div class="flex items-baseline gap-4">
              <span class="text-6xl font-bold text-white tracking-tight">{{todayStars}}</span>
              <span class="text-xl font-medium text-primary flex items-center">
                <span class="material-symbols-outlined text-2xl mr-1">trending_up</span>
                Stars
              </span>
            </div>
          </div>
        </div>
        <!-- Chart Area -->
        <div class="relative h-32 w-full">
          <svg class="w-full h-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 478 150" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#137fec" stop-opacity="0.3"></stop>
                <stop offset="100%" stop-color="#137fec" stop-opacity="0"></stop>
              </linearGradient>
            </defs>
            <path d="M0 109C18.1538 109 18.1538 21 36.3077 21C54.4615 21 54.4615 41 72.6154 41C90.7692 41 90.7692 93 108.923 93C127.077 93 127.077 33 145.231 33C163.385 33 163.385 101 181.538 101C199.692 101 199.692 61 217.846 61C236 61 236 45 254.154 45C272.308 45 272.308 121 290.462 121C308.615 121 308.615 149 326.769 149C344.923 149 344.923 1 363.077 1C381.231 1 381.231 81 399.385 81C417.538 81 417.538 129 435.692 129C453.846 129 453.846 25 472 25V150H0V109Z" fill="url(#chartGradient)"></path>
            <path class="neon-stroke" d="M0 109C18.1538 109 18.1538 21 36.3077 21C54.4615 21 54.4615 41 72.6154 41C90.7692 41 90.7692 93 108.923 93C127.077 93 127.077 33 145.231 33C163.385 33 163.385 101 181.538 101C199.692 101 199.692 61 217.846 61C236 61 236 45 254.154 45C272.308 45 272.308 121 290.462 121C308.615 121 308.615 149 326.769 149C344.923 149 344.923 1 363.077 1C381.231 1 381.231 81 399.385 81C417.538 81 417.538 129 435.692 129C453.846 129 453.846 25 472 25" fill="none" stroke="#137fec" stroke-linecap="round" stroke-width="3"></path>
          </svg>
        </div>
      </div>

      <!-- Data Dashboard Grid -->
      <div class="grid grid-cols-2 gap-1 bg-white/10 border border-white/10 rounded-xl overflow-hidden flex-1 mb-8 shadow-inner">
        <!-- Cell 1: Total Stars -->
        <div class="bg-background-dark/95 backdrop-blur-sm p-8 flex flex-col justify-center">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-2xl text-gray-500">star</span>
            <span class="text-sm uppercase tracking-[0.15em] text-gray-500 font-medium">Total Stars</span>
          </div>
          <span class="text-4xl font-bold text-white">{{stars}}</span>
        </div>
        <!-- Cell 2: Forks -->
        <div class="bg-background-dark/95 backdrop-blur-sm p-8 flex flex-col justify-center">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-2xl text-gray-500">fork_right</span>
            <span class="text-sm uppercase tracking-[0.15em] text-gray-500 font-medium">Forks</span>
          </div>
          <span class="text-4xl font-bold text-white">{{forks}}</span>
        </div>
        <!-- Cell 3: Language -->
        <div class="bg-background-dark/95 backdrop-blur-sm p-8 flex flex-col justify-center">
          <div class="flex items-center gap-3 mb-2">
            <span class="w-4 h-4 rounded-full" style="background-color: {{languageColor}}"></span>
            <span class="text-sm uppercase tracking-[0.15em] text-gray-500 font-medium">Language</span>
          </div>
          <span class="text-3xl font-bold text-white truncate">{{language}}</span>
        </div>
        <!-- Cell 4: Rank -->
        <div class="bg-background-dark/95 backdrop-blur-sm p-8 flex flex-col justify-center">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-2xl text-gray-500">trophy</span>
            <span class="text-sm uppercase tracking-[0.15em] text-gray-500 font-medium">Rank</span>
          </div>
          <span class="text-4xl font-bold text-white">#{{rank}}</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="flex justify-between items-center pt-4">
        <div class="flex items-center gap-4">
          <div class="h-12 w-12 rounded bg-white flex items-center justify-center text-background-dark">
            <span class="material-symbols-outlined text-3xl">bar_chart</span>
          </div>
          <div class="flex flex-col">
            <span class="text-white font-bold text-lg leading-none">GitHub Stats</span>
            <span class="text-sm text-gray-500 mt-1 uppercase tracking-wider">Daily Report</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
