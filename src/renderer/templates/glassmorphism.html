<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Glassmorphism</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#7f13ec",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .glass-panel {
      background: rgba(25, 16, 34, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .glass-pill {
      background: rgba(25, 16, 34, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .mesh-gradient-bg {
      background-color: #191022;
      background-image:
        radial-gradient(at 0% 0%, hsla(276,68%,28%,1) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(273,65%,48%,0.6) 0, transparent 50%),
        radial-gradient(at 100% 100%, hsla(262,72%,33%,1) 0, transparent 50%);
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] mesh-gradient-bg flex items-center justify-center font-display text-white">
    <div class="glass-panel w-[900px] h-[1200px] rounded-3xl p-12 flex flex-col justify-between relative overflow-hidden">
      <!-- Decorative Top Blob -->
      <div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/20 blur-3xl rounded-full pointer-events-none"></div>

      <!-- Card Header -->
      <div class="flex flex-col gap-6 relative z-10">
        <div class="flex items-center gap-4">
          <div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-purple-400 flex items-center justify-center text-white text-3xl font-bold shadow-lg">
            {{rank}}
          </div>
          <div class="flex flex-col">
            <span class="text-sm font-semibold uppercase tracking-wider text-[#d8b4fe] opacity-80">Repository</span>
            <h3 class="text-4xl font-extrabold text-white leading-tight">{{owner}} / {{name}}</h3>
          </div>
        </div>
      </div>

      <!-- Description Block -->
      <div class="flex-1 flex flex-col justify-center py-8 relative z-10">
        <div class="glass-pill p-8 rounded-2xl">
          <div class="flex items-center gap-3 mb-4">
            <span class="material-symbols-outlined text-primary text-2xl">code</span>
            <span class="w-4 h-4 rounded-full" style="background-color: {{languageColor}}"></span>
            <span class="text-lg font-bold text-[#d8b4fe]">{{language}}</span>
          </div>
          <p class="text-white/90 text-2xl font-medium leading-relaxed">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-6 relative z-10">
        <div class="glass-pill p-6 rounded-2xl flex flex-col items-start gap-2">
          <div class="flex items-center gap-2 text-[#d8b4fe]">
            <span class="material-symbols-outlined text-2xl">star</span>
            <span class="text-sm font-bold uppercase tracking-wider">Stars</span>
          </div>
          <p class="text-4xl font-extrabold text-white">{{stars}}</p>
        </div>
        <div class="glass-pill p-6 rounded-2xl flex flex-col items-start gap-2">
          <div class="flex items-center gap-2 text-[#d8b4fe]">
            <span class="material-symbols-outlined text-2xl">fork_right</span>
            <span class="text-sm font-bold uppercase tracking-wider">Forks</span>
          </div>
          <p class="text-4xl font-extrabold text-white">{{forks}}</p>
        </div>
        <div class="col-span-2 glass-pill p-6 rounded-2xl flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="p-3 rounded-full bg-green-400/20 text-green-300">
              <span class="material-symbols-outlined text-2xl block">trending_up</span>
            </div>
            <span class="text-xl font-medium text-white">Today's Activity</span>
          </div>
          <p class="text-3xl font-extrabold text-white">{{todayStars}}</p>
        </div>
      </div>

      <!-- Watermark -->
      <div class="absolute bottom-8 right-8 opacity-30 pointer-events-none">
        <span class="material-symbols-outlined text-6xl text-white rotate-12">code_blocks</span>
      </div>
    </div>
  </div>
</body>
</html>
