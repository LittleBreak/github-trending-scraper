<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Manga Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#f20d0d",
          },
          fontFamily: {
            "display": ["Spline Sans", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .manga-shadow-text {
      text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }
    .manga-panel-border {
      border: 3px solid #000;
      box-shadow: 4px 4px 0px rgba(242, 13, 13, 0.4);
    }
    .clip-burst {
      clip-path: polygon(20% 0%, 35% 15%, 50% 0%, 65% 15%, 80% 0%, 100% 20%, 85% 35%, 100% 50%, 85% 65%, 100% 80%, 80% 100%, 65% 85%, 50% 100%, 35% 85%, 20% 100%, 0% 80%, 15% 65%, 0% 50%, 15% 35%, 0% 20%);
    }
    .clip-speech-bubble {
      clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 60% 85%, 40% 100%, 45% 85%, 0% 85%);
    }
    .bg-rays {
      background: repeating-conic-gradient(from 0deg, #1a1a1a 0deg 15deg, #222 15deg 30deg);
    }
    .halftone {
      background-image: radial-gradient(circle, #f20d0d 1px, transparent 1.5px);
      background-size: 8px 8px;
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-white dark:bg-[#111] overflow-hidden border-8 border-black font-display text-white relative">
    <!-- Global Background Texture -->
    <div class="absolute inset-0 halftone opacity-[0.05] pointer-events-none z-10"></div>
    <div class="absolute inset-0 bg-rays opacity-100 z-0"></div>

    <!-- Content Grid Layout -->
    <div class="absolute inset-0 z-20 flex flex-col p-8 gap-8">
      <!-- TOP SECTION: HEADER + AVATAR -->
      <div class="flex flex-row h-1/4 gap-6">
        <!-- Avatar Panel -->
        <div class="w-1/3 relative manga-panel-border bg-black overflow-hidden transform -rotate-2 flex items-center justify-center">
          <span class="text-8xl font-black text-primary manga-shadow-text">{{rank}}</span>
        </div>
        <!-- Title Panel -->
        <div class="flex-1 flex flex-col justify-center items-start pl-4 relative">
          <div class="bg-primary px-6 py-2 -rotate-1 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mb-4 inline-block">
            <span class="text-white text-lg font-black tracking-widest uppercase">Repository</span>
          </div>
          <h1 class="text-7xl font-black text-white italic tracking-tighter uppercase leading-[0.9] manga-shadow-text transform skew-x-[-10deg]">
            {{name}}
          </h1>
          <p class="text-2xl text-gray-400 mt-2 font-bold">by {{owner}}</p>
        </div>
      </div>

      <!-- MIDDLE SECTION: STATS -->
      <div class="flex-1 relative flex items-center justify-center">
        <!-- RANK BADGE -->
        <div class="absolute top-0 left-0 z-30 transform -rotate-12 -translate-y-8">
          <div class="bg-primary text-white p-12 clip-burst shadow-lg flex flex-col items-center justify-center w-48 h-48">
            <span class="text-lg font-bold mt-4">RANK</span>
            <span class="text-6xl font-black italic">#{{rank}}</span>
          </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-8 w-full h-full pt-16">
          <!-- Stars -->
          <div class="relative border-8 border-white bg-black/50 backdrop-blur-sm p-8 flex flex-col items-center justify-center transform rotate-1 rounded">
            <div class="absolute top-[-20px] right-[-15px] bg-white text-black px-4 py-2 text-lg font-bold border-4 border-black rotate-3">
              STARS
            </div>
            <span class="material-symbols-outlined text-primary text-7xl mb-2" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="text-6xl font-black text-white tracking-tighter">{{stars}}</span>
            <span class="text-lg text-gray-300 font-bold uppercase tracking-widest mt-2">Stargazers</span>
          </div>
          <!-- Forks -->
          <div class="relative border-8 border-white bg-black/50 backdrop-blur-sm p-8 flex flex-col items-center justify-center transform -rotate-1 rounded">
            <div class="absolute bottom-[-20px] left-[-15px] bg-primary text-white px-4 py-2 text-lg font-bold border-4 border-black -rotate-3 z-10">
              FORKS
            </div>
            <span class="material-symbols-outlined text-white text-7xl mb-2">fork_right</span>
            <span class="text-6xl font-black text-white tracking-tighter">{{forks}}</span>
            <span class="text-lg text-gray-300 font-bold uppercase tracking-widest mt-2">Network</span>
          </div>
        </div>
      </div>

      <!-- BOTTOM SECTION: LANGUAGE & FOOTER -->
      <div class="h-1/4 flex flex-col gap-4">
        <!-- Language & Today Strip -->
        <div class="flex items-center gap-4">
          <!-- Speech Bubble for Language -->
          <div class="relative bg-white text-black p-8 pb-12 clip-speech-bubble min-w-[200px]">
            <p class="text-2xl font-black uppercase text-center leading-tight">It's<br/>{{language}}!</p>
          </div>
          <!-- Today Strip -->
          <div class="flex-1 bg-black border-4 border-white p-4 flex justify-between items-center transform rotate-1 shadow-[4px_4px_0px_#f20d0d]">
            <div class="flex flex-col">
              <span class="text-sm text-gray-400 uppercase font-bold">Today</span>
              <span class="text-4xl font-bold text-primary">{{todayStars}}</span>
            </div>
            <span class="material-symbols-outlined text-white text-4xl">trending_up</span>
          </div>
        </div>
        <!-- Footer -->
        <div class="mt-auto bg-primary/90 text-white p-4 text-center text-lg font-mono tracking-widest border-t-4 border-black">
          {{description}}
        </div>
      </div>

      <!-- Decorative corner accents -->
      <div class="absolute top-4 right-4 w-8 h-8 border-t-8 border-r-8 border-white"></div>
      <div class="absolute bottom-4 left-4 w-8 h-8 border-b-8 border-l-8 border-white"></div>
    </div>
  </div>
</body>
</html>
