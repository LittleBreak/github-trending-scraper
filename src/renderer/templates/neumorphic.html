<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Share Card Neumorphic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "background-light": "#e0e5ec",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
        },
      },
    }
  </script>
  <style>
    .neu-flat {
      background: #e0e5ec;
      box-shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
    }
    .neu-pressed {
      background: #e0e5ec;
      box-shadow: inset 6px 6px 10px #a3b1c6, inset -6px -6px 10px #ffffff;
    }
  </style>
</head>
<body class="bg-background-light font-display text-slate-600 m-0 p-0">
  <div id="card" class="relative w-[380px] aspect-[3/4] rounded-3xl neu-flat p-6 flex flex-col items-center justify-between overflow-hidden">
    <!-- Decorative accent -->
    <div class="absolute -top-10 -right-10 size-32 rounded-full bg-gradient-to-br from-white/40 to-transparent blur-2xl pointer-events-none"></div>

    <!-- Card Header -->
    <div class="flex flex-col items-center w-full mt-4">
      <!-- Avatar -->
      <div class="relative p-1 rounded-full neu-flat mb-4">
        <div class="size-20 rounded-full overflow-hidden border-2 border-[#e0e5ec] shadow-inner bg-gray-200 flex items-center justify-center">
          <span class="text-slate-600 text-3xl font-bold">{{firstName}}</span>
        </div>
        <!-- Verified Badge -->
        <div class="absolute bottom-1 right-1 bg-primary text-white p-1 rounded-full shadow-md flex items-center justify-center border-2 border-[#e0e5ec]">
          <span class="material-symbols-outlined text-[12px] font-bold leading-none">check</span>
        </div>
      </div>
      <h2 class="text-slate-800 text-xl font-bold tracking-tight mb-1 text-center">{{owner}}/{{name}}</h2>
      <p class="text-slate-500 text-xs text-center leading-relaxed px-2 font-medium line-clamp-3">
        {{description}}
      </p>
    </div>

    <!-- Stats Grid -->
    <div class="w-full grid grid-cols-3 gap-3 mt-2">
      <div class="flex flex-col items-center justify-center py-3 px-1 rounded-xl neu-pressed">
        <span class="material-symbols-outlined text-slate-400 text-[20px] mb-1">star</span>
        <span class="text-slate-700 text-sm font-bold">{{stars}}</span>
        <span class="text-slate-400 text-[10px] font-medium uppercase tracking-wider">Stars</span>
      </div>
      <div class="flex flex-col items-center justify-center py-3 px-1 rounded-xl neu-pressed">
        <span class="material-symbols-outlined text-slate-400 text-[20px] mb-1">call_split</span>
        <span class="text-slate-700 text-sm font-bold">{{forks}}</span>
        <span class="text-slate-400 text-[10px] font-medium uppercase tracking-wider">Forks</span>
      </div>
      <div class="flex flex-col items-center justify-center py-3 px-1 rounded-xl neu-pressed">
        <span class="material-symbols-outlined text-slate-400 text-[20px] mb-1">code</span>
        <span class="text-slate-700 text-sm font-bold truncate w-full text-center">{{language}}</span>
        <span class="text-slate-400 text-[10px] font-medium uppercase tracking-wider">Lang</span>
      </div>
    </div>

    <!-- Trend Highlight -->
    <div class="w-full mt-2">
      <div class="w-full p-4 rounded-2xl neu-flat flex items-center justify-between border border-white/40">
        <div class="flex items-center gap-3">
          <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary shadow-[inset_2px_2px_5px_rgba(0,0,0,0.05)]">
            <span class="material-symbols-outlined">trending_up</span>
          </div>
          <div class="flex flex-col">
            <span class="text-primary font-bold text-sm">+{{todayStars}} Stars</span>
            <span class="text-slate-400 text-[10px] font-medium">#{{rank}} Trending Today</span>
          </div>
        </div>
        <!-- Mini Chart -->
        <div class="h-8 w-16 flex items-end justify-end gap-1 opacity-60">
          <div class="w-1 bg-primary/40 h-[40%] rounded-t-sm"></div>
          <div class="w-1 bg-primary/60 h-[70%] rounded-t-sm"></div>
          <div class="w-1 bg-primary/30 h-[30%] rounded-t-sm"></div>
          <div class="w-1 bg-primary h-[90%] rounded-t-sm shadow-[0_0_8px_rgba(19,127,236,0.4)]"></div>
          <div class="w-1 bg-primary/50 h-[60%] rounded-t-sm"></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="w-full flex justify-center items-center opacity-40 mt-auto pt-4">
      <span class="text-[10px] font-bold tracking-[0.2em] text-slate-400 uppercase">GitHub Card</span>
    </div>
  </div>
</body>
</html>
