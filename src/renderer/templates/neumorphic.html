<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Neumorphic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
          },
          fontFamily: {
            "display": ["Inter", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .neu-flat {
      background: #e0e5ec;
      box-shadow: 9px 9px 16px #a3b1c6, -9px -9px 16px #ffffff;
    }
    .neu-pressed {
      background: #e0e5ec;
      box-shadow: inset 6px 6px 10px #a3b1c6, inset -6px -6px 10px #ffffff;
    }
    .neu-convex {
      background: linear-gradient(145deg, #f0f5fd, #caccce);
      box-shadow: 8px 8px 16px rgba(170, 180, 190, 0.2), inset 4px 4px 8px rgba(255, 255, 255, 1), inset -4px -4px 8px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="m-0 p-0 bg-[#e0e5ec]">
  <div id="card" class="w-[1080px] h-[1440px] bg-[#e0e5ec] flex items-center justify-center font-display">
    <div class="neu-flat w-[920px] h-[1280px] rounded-[48px] p-12 flex flex-col items-center justify-between">
      <!-- Card Header -->
      <div class="flex flex-col items-center w-full mt-8">
        <!-- Avatar -->
        <div class="relative p-2 rounded-full neu-flat mb-8">
          <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-[#e0e5ec] shadow-inner flex items-center justify-center bg-gradient-to-br from-primary to-blue-400">
            <span class="text-white text-5xl font-bold">{{rank}}</span>
          </div>
          <!-- Verified Badge -->
          <div class="absolute bottom-2 right-2 bg-primary text-white p-2 rounded-full shadow-md flex items-center justify-center border-4 border-[#e0e5ec]">
            <span class="material-symbols-outlined text-xl font-bold">check</span>
          </div>
        </div>
        <h2 class="text-slate-800 text-4xl font-bold tracking-tight mb-3 text-center">{{owner}}/{{name}}</h2>
        <p class="text-slate-500 text-lg text-center leading-relaxed px-4 font-medium max-w-2xl">
          {{description}}
        </p>
      </div>

      <!-- Stats Grid -->
      <div class="w-full grid grid-cols-3 gap-6 mt-8">
        <div class="flex flex-col items-center justify-center py-6 px-2 rounded-2xl neu-pressed">
          <span class="material-symbols-outlined text-slate-400 text-4xl mb-2">star</span>
          <span class="text-slate-700 text-2xl font-bold">{{stars}}</span>
          <span class="text-slate-400 text-sm font-medium uppercase tracking-wider">Stars</span>
        </div>
        <div class="flex flex-col items-center justify-center py-6 px-2 rounded-2xl neu-pressed">
          <span class="material-symbols-outlined text-slate-400 text-4xl mb-2">call_split</span>
          <span class="text-slate-700 text-2xl font-bold">{{forks}}</span>
          <span class="text-slate-400 text-sm font-medium uppercase tracking-wider">Forks</span>
        </div>
        <div class="flex flex-col items-center justify-center py-6 px-2 rounded-2xl neu-pressed">
          <span class="w-5 h-5 rounded-full mb-2" style="background-color: {{languageColor}}"></span>
          <span class="text-slate-700 text-2xl font-bold">{{language}}</span>
          <span class="text-slate-400 text-sm font-medium uppercase tracking-wider">Lang</span>
        </div>
      </div>

      <!-- Trend Highlight -->
      <div class="w-full mt-8">
        <div class="w-full p-8 rounded-3xl neu-flat flex items-center justify-between border border-white/40">
          <div class="flex items-center gap-6">
            <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary shadow-[inset_2px_2px_5px_rgba(0,0,0,0.05)]">
              <span class="material-symbols-outlined text-4xl">trending_up</span>
            </div>
            <div class="flex flex-col">
              <span class="text-primary font-bold text-2xl">{{todayStars}}</span>
              <span class="text-slate-400 text-sm font-medium">Trending Today</span>
            </div>
          </div>
          <!-- Mini Chart Visual -->
          <div class="h-12 w-24 flex items-end justify-end gap-2 opacity-60">
            <div class="w-2 bg-primary/40 h-[40%] rounded-t-sm"></div>
            <div class="w-2 bg-primary/60 h-[70%] rounded-t-sm"></div>
            <div class="w-2 bg-primary/30 h-[30%] rounded-t-sm"></div>
            <div class="w-2 bg-primary h-[90%] rounded-t-sm shadow-[0_0_8px_rgba(19,127,236,0.4)]"></div>
            <div class="w-2 bg-primary/50 h-[60%] rounded-t-sm"></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="w-full flex justify-center items-center opacity-40 mt-auto pt-8">
        <span class="text-sm font-bold tracking-[0.2em] text-slate-400 uppercase">Generated with GitCard</span>
      </div>
    </div>
  </div>
</body>
</html>
