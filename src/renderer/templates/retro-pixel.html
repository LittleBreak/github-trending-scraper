<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Retro Pixel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#0df20d",
            "primary-dim": "#087008",
          },
          fontFamily: {
            "pixel": ["VT323", "monospace"],
            "game": ["Press Start 2P", "cursive"],
          },
        },
      },
    }
  </script>
  <style>
    .text-glow {
      text-shadow: 0 0 4px rgba(13, 242, 13, 0.6), 0 0 8px rgba(13, 242, 13, 0.3);
    }
    .box-glow {
      box-shadow: 0 0 10px rgba(13, 242, 13, 0.2), inset 0 0 10px rgba(13, 242, 13, 0.1);
    }
    .scanline-overlay {
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
      background-size: 100% 4px;
      pointer-events: none;
    }
    .cursor-blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-black rounded overflow-hidden font-pixel text-primary relative">
    <!-- CRT Effects Layer -->
    <div class="absolute inset-0 z-20 scanline-overlay opacity-60 pointer-events-none"></div>
    <div class="absolute inset-0 z-20 bg-[radial-gradient(circle,rgba(13,242,13,0.03)_0%,rgba(0,0,0,0.6)_100%)] pointer-events-none"></div>

    <!-- Card Content -->
    <div class="relative z-10 w-full h-full p-10 flex flex-col tracking-wide leading-none justify-between border-[12px] border-double border-primary/40 m-2 box-border h-[calc(100%-16px)] w-[calc(100%-16px)] bg-[#081008]">
      <!-- Header Section -->
      <div class="space-y-8">
        <div class="flex justify-between items-end border-b-4 border-primary/50 pb-4 border-dashed">
          <span class="text-3xl">GITHUB_NET v2.0</span>
          <span class="text-2xl animate-pulse">● REC</span>
        </div>

        <!-- Repo Details -->
        <div class="space-y-4 mt-8">
          <h1 class="font-game text-4xl text-white text-glow break-all leading-relaxed">{{owner}}/<br/>{{name}}</h1>
          <div class="text-2xl text-primary/80 mt-4 leading-8 h-40 overflow-hidden relative">
            <span class="text-white">&gt;</span> {{description}}<span class="cursor-blink bg-primary text-black inline-block w-4 h-8 align-middle ml-2"> </span>
          </div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-6 mt-auto">
        <!-- Stars -->
        <div class="border-4 border-primary bg-black/40 p-6 flex flex-col items-center justify-center gap-2 box-glow">
          <span class="material-symbols-outlined text-4xl">star</span>
          <span class="text-lg text-primary/70">STARS</span>
          <span class="text-4xl font-bold text-white">{{stars}}</span>
        </div>
        <!-- Forks -->
        <div class="border-4 border-primary bg-black/40 p-6 flex flex-col items-center justify-center gap-2 box-glow">
          <span class="material-symbols-outlined text-4xl">call_split</span>
          <span class="text-lg text-primary/70">FORKS</span>
          <span class="text-4xl font-bold text-white">{{forks}}</span>
        </div>
        <!-- Language Badge -->
        <div class="col-span-2 border-4 border-primary bg-primary/10 p-4 flex items-center justify-between px-8">
          <span class="text-2xl">LANG:</span>
          <div class="flex items-center gap-4">
            <span class="w-6 h-6 rounded-full" style="background-color: {{languageColor}}"></span>
            <span class="text-3xl font-bold text-white bg-primary/20 px-4">[ {{language}} ]</span>
          </div>
        </div>
      </div>

      <!-- Footer Rank -->
      <div class="mt-8 pt-6 border-t-4 border-dashed border-primary/50 text-center">
        <p class="text-2xl text-primary/60 mb-2">RANKING ANALYSIS</p>
        <p class="font-game text-yellow-400 text-2xl text-glow animate-pulse">RANK #{{rank}} - {{todayStars}}</p>
      </div>

      <!-- Watermark -->
      <div class="absolute bottom-2 right-4 text-sm text-primary/30">
        gh-card.exe
      </div>
    </div>
  </div>
</body>
</html>
