<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Share Card Retro Pixel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0df20d",
            "primary-dim": "#087008",
            "background-dark": "#050a05",
            "surface-dark": "#102210",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
            "pixel": ["'VT323'", "monospace"],
            "game": ["'Press Start 2P'", "cursive"],
          },
        },
      },
    }
  </script>
  <style>
    .text-glow { text-shadow: 0 0 4px rgba(13, 242, 13, 0.6), 0 0 8px rgba(13, 242, 13, 0.3); }
    .box-glow { box-shadow: 0 0 10px rgba(13, 242, 13, 0.2), inset 0 0 10px rgba(13, 242, 13, 0.1); }
    .scanline-overlay {
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
      background-size: 100% 4px;
      pointer-events: none;
    }
    .cursor-blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body class="bg-surface-dark font-display m-0 p-0">
  <div id="card" class="relative w-[380px] aspect-[3/4] bg-black rounded-sm border-4 border-[#1a1a1a] overflow-hidden">
    <!-- CRT Effects -->
    <div class="absolute inset-0 z-20 scanline-overlay opacity-60 pointer-events-none"></div>
    <div class="absolute inset-0 z-20 bg-[radial-gradient(circle,rgba(13,242,13,0.03)_0%,rgba(0,0,0,0.6)_100%)] pointer-events-none"></div>

    <!-- Content -->
    <div class="relative z-10 w-full h-full p-5 flex flex-col font-pixel text-primary tracking-wide leading-none justify-between border-[6px] border-double border-primary/40 m-1 box-border h-[calc(100%-8px)] w-[calc(100%-8px)] bg-[#081008]">
      <!-- Header -->
      <div class="space-y-4">
        <div class="flex justify-between items-end border-b-2 border-primary/50 pb-2 border-dashed">
          <span class="text-xl">GITHUB_NET v2.0</span>
          <span class="text-lg animate-pulse">REC</span>
        </div>

        <!-- Repo Details -->
        <div class="space-y-2 mt-4">
          <h1 class="font-game text-xl text-white text-glow break-all leading-relaxed">{{owner}}/<br/>{{name}}</h1>
          <div class="text-xl text-primary/80 mt-2 leading-6 h-20 overflow-hidden relative">
            <span class="text-white">&gt;</span> {{description}}<span class="cursor-blink bg-primary text-black inline-block w-3 h-5 align-middle ml-1"> </span>
          </div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-3 mt-auto">
        <div class="border-2 border-primary bg-black/40 p-2 flex flex-col items-center justify-center gap-1 box-glow">
          <span class="material-symbols-outlined text-2xl">star</span>
          <span class="text-xs text-primary/70">STARS</span>
          <span class="text-2xl font-bold text-white">{{stars}}</span>
        </div>
        <div class="border-2 border-primary bg-black/40 p-2 flex flex-col items-center justify-center gap-1 box-glow">
          <span class="material-symbols-outlined text-2xl">call_split</span>
          <span class="text-xs text-primary/70">FORKS</span>
          <span class="text-2xl font-bold text-white">{{forks}}</span>
        </div>
        <div class="col-span-2 border-2 border-primary bg-primary/10 p-2 flex items-center justify-between px-4">
          <span class="text-lg">LANG:</span>
          <span class="text-xl font-bold text-white bg-primary/20 px-2">[ {{language}} ]</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-4 pt-3 border-t-2 border-dashed border-primary/50 text-center">
        <p class="text-lg text-primary/60 mb-1">RANKING ANALYSIS</p>
        <p class="font-game text-yellow-400 text-lg text-glow animate-pulse">LEVEL: #{{rank}} TRENDING</p>
        <p class="text-sm text-primary/50 mt-2">+{{todayStars}} STARS TODAY</p>
      </div>
    </div>
  </div>
</body>
</html>
