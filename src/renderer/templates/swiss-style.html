<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Swiss Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#1313ec",
          },
          fontFamily: {
            "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .swiss-offset-text {
      text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-primary flex flex-col text-white relative overflow-hidden border-[12px] border-white font-display">
    <!-- Background Decorative Pattern -->
    <div class="absolute right-[-15%] top-[-8%] text-white/5 font-bold text-[200px] leading-none select-none pointer-events-none -rotate-6 origin-top-right whitespace-nowrap z-0">
      GITHUB REPO
    </div>

    <!-- Card Content -->
    <div class="relative z-10 flex flex-col h-full">
      <!-- Row 1: Header Info -->
      <div class="border-b-[8px] border-white p-10 flex justify-between items-start bg-primary">
        <div class="flex flex-col gap-2">
          <span class="text-sm font-bold tracking-[0.2em] uppercase opacity-90">Repository</span>
          <span class="text-lg font-bold tracking-widest uppercase bg-white text-primary px-2 w-fit">Trending #{{rank}}</span>
        </div>
        <!-- Rank Badge -->
        <div class="w-20 h-20 bg-white overflow-hidden border-4 border-white shadow-sm flex items-center justify-center">
          <span class="text-primary text-4xl font-bold">{{rank}}</span>
        </div>
      </div>

      <!-- Row 2: Main Typography -->
      <div class="flex-1 flex flex-col justify-center px-10 py-8 border-b-[8px] border-white relative bg-primary">
        <h2 class="text-[80px] font-bold uppercase leading-[0.8] tracking-tighter break-words swiss-offset-text">
          {{name}}
        </h2>
        <p class="text-2xl text-white/80 mt-2">by {{owner}}</p>
        <div class="mt-8 w-20 h-4 bg-white"></div>
        <p class="mt-6 text-xl font-medium leading-snug max-w-[95%] opacity-100">
          {{description}}
        </p>
      </div>

      <!-- Row 3: Stats Grid -->
      <div class="grid grid-cols-3 border-b-[8px] border-white h-48 bg-primary">
        <!-- Stars -->
        <div class="border-r-[8px] border-white p-8 flex flex-col justify-between items-start">
          <span class="material-symbols-outlined text-4xl">star</span>
          <div>
            <p class="text-4xl font-bold leading-none tracking-tight">{{stars}}</p>
            <p class="text-sm uppercase font-bold tracking-widest opacity-80 mt-2">Stars</p>
          </div>
        </div>
        <!-- Forks -->
        <div class="border-r-[8px] border-white p-8 flex flex-col justify-between items-start">
          <span class="material-symbols-outlined text-4xl">call_split</span>
          <div>
            <p class="text-4xl font-bold leading-none tracking-tight">{{forks}}</p>
            <p class="text-sm uppercase font-bold tracking-widest opacity-80 mt-2">Forks</p>
          </div>
        </div>
        <!-- Language -->
        <div class="p-8 flex flex-col justify-between items-start">
          <span class="w-6 h-6 rounded-full" style="background-color: {{languageColor}}"></span>
          <div>
            <p class="text-3xl font-bold leading-none tracking-tight">{{language}}</p>
            <p class="text-sm uppercase font-bold tracking-widest opacity-80 mt-2">Lang</p>
          </div>
        </div>
      </div>

      <!-- Row 4: Footer -->
      <div class="p-8 flex items-center justify-between bg-white text-primary h-24">
        <div class="flex items-center gap-4">
          <span class="material-symbols-outlined text-2xl">trending_up</span>
          <span class="text-lg font-bold tracking-widest uppercase">{{todayStars}}</span>
        </div>
        <div class="text-lg font-bold tracking-widest uppercase border-4 border-primary px-4 py-1 rounded-full">
          SWISS_V{{rank}}
        </div>
      </div>
    </div>
  </div>
</body>
</html>
