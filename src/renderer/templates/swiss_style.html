<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Share Card Swiss Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#1313ec",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .swiss-offset-text { text-shadow: 4px 4px 0px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="bg-[#f6f6f8] font-display text-slate-900 m-0 p-0">
  <div id="card" class="w-[380px] aspect-[3/4] bg-primary flex flex-col text-white relative overflow-hidden border-[6px] border-white">
    <!-- Background Decorative Text -->
    <div class="absolute right-[-15%] top-[-8%] text-white/5 font-bold text-[120px] leading-none select-none pointer-events-none -rotate-6 origin-top-right whitespace-nowrap z-0">
      GITHUB REPO
    </div>

    <!-- Card Content -->
    <div class="relative z-10 flex flex-col h-full">
      <!-- Row 1: Header -->
      <div class="border-b-[4px] border-white p-5 flex justify-between items-start bg-primary">
        <div class="flex flex-col gap-1">
          <span class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-90">Repository</span>
          <span class="text-xs font-bold tracking-widest uppercase bg-white text-primary px-1 w-fit">#{{rank}} Trending</span>
        </div>
        <!-- Avatar -->
        <div class="w-12 h-12 bg-white overflow-hidden border-2 border-white shadow-sm flex items-center justify-center">
          <span class="text-primary text-xl font-bold">{{firstName}}</span>
        </div>
      </div>

      <!-- Row 2: Main Typography -->
      <div class="flex-1 flex flex-col justify-center px-5 py-4 border-b-[4px] border-white relative bg-primary">
        <h2 class="text-[2.8rem] font-bold uppercase leading-[0.8] tracking-tighter break-words swiss-offset-text">
          {{name}}
        </h2>
        <p class="text-sm text-white/70 mt-1">by {{owner}}</p>
        <div class="mt-6 w-12 h-2 bg-white"></div>
        <p class="mt-4 text-sm font-medium leading-snug max-w-[95%] opacity-100 line-clamp-3">
          {{description}}
        </p>
      </div>

      <!-- Row 3: Stats Grid -->
      <div class="grid grid-cols-3 border-b-[4px] border-white h-28 bg-primary">
        <div class="border-r-[4px] border-white p-4 flex flex-col justify-between items-start">
          <span class="material-symbols-outlined text-[24px]">star</span>
          <div>
            <p class="text-2xl font-bold leading-none tracking-tight">{{stars}}</p>
            <p class="text-[9px] uppercase font-bold tracking-widest opacity-80 mt-1">Stars</p>
          </div>
        </div>
        <div class="border-r-[4px] border-white p-4 flex flex-col justify-between items-start">
          <span class="material-symbols-outlined text-[24px]">call_split</span>
          <div>
            <p class="text-2xl font-bold leading-none tracking-tight">{{forks}}</p>
            <p class="text-[9px] uppercase font-bold tracking-widest opacity-80 mt-1">Forks</p>
          </div>
        </div>
        <div class="p-4 flex flex-col justify-between items-start">
          <span class="material-symbols-outlined text-[24px]">code</span>
          <div>
            <p class="text-2xl font-bold leading-none tracking-tight truncate w-full">{{language}}</p>
            <p class="text-[9px] uppercase font-bold tracking-widest opacity-80 mt-1">Lang</p>
          </div>
        </div>
      </div>

      <!-- Row 4: Footer -->
      <div class="p-4 flex items-center justify-between bg-white text-primary h-14">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">trending_up</span>
          <span class="text-[10px] font-bold tracking-widest uppercase">+{{todayStars}} today</span>
        </div>
        <div class="text-[10px] font-bold tracking-widest uppercase border-2 border-primary px-2 py-0.5 rounded-full">
          SWISS
        </div>
      </div>
    </div>
  </div>
</body>
</html>
