<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Variant 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "neon-cyan": "#00f0ff",
            "neon-purple": "#bc13fe",
          },
          fontFamily: {
            "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .glass-panel {
      background: rgba(17, 26, 34, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .glow-text {
      text-shadow: 0 0 10px rgba(19, 127, 236, 0.5);
    }
    .bg-grid-pattern {
      background-image: linear-gradient(to right, #1f2937 1px, transparent 1px), linear-gradient(to bottom, #1f2937 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-[#0a0f16] overflow-hidden border border-[#1e293b] flex flex-col font-display text-white relative">
    <!-- Abstract Background Visuals -->
    <div class="absolute inset-0 z-0 opacity-20 bg-grid-pattern pointer-events-none"></div>
    <div class="absolute top-[-20%] right-[-20%] w-[80%] h-[60%] bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[50%] bg-neon-purple/10 rounded-full blur-[80px] pointer-events-none"></div>

    <!-- Content Wrapper -->
    <div class="relative z-10 flex flex-col h-full p-12 justify-between">
      <!-- Top Section: Rank & Header -->
      <div class="flex flex-col items-center gap-8">
        <!-- Rank Badge -->
        <div class="relative">
          <div class="absolute -inset-1 bg-gradient-to-r from-primary to-neon-cyan rounded-full blur opacity-50"></div>
          <div class="relative flex items-center gap-3 px-8 py-3 bg-[#0a0f16] rounded-full border border-primary/30 shadow-[0_0_15px_rgba(19,127,236,0.3)]">
            <span class="material-symbols-outlined text-primary text-2xl">trophy</span>
            <span class="text-lg font-bold tracking-wider text-white">#{{rank}} TRENDING</span>
          </div>
        </div>
      </div>

      <!-- Middle Section: Repo Identity & Details -->
      <div class="flex flex-col items-center flex-grow justify-center gap-8 my-8">
        <!-- Avatar with Glow -->
        <div class="relative">
          <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary via-neon-cyan to-neon-purple blur-lg opacity-60"></div>
          <div class="relative w-40 h-40 rounded-full border-4 border-white/10 bg-[#111a22] p-2 shadow-2xl flex items-center justify-center">
            <span class="text-6xl font-bold text-primary">{{rank}}</span>
          </div>
        </div>

        <!-- Repo Title -->
        <div class="text-center space-y-2">
          <p class="text-[#92adc9] text-xl font-medium tracking-widest uppercase opacity-80">{{owner}}</p>
          <h1 class="text-6xl font-bold tracking-tight text-white glow-text">
            {{name}}
          </h1>
        </div>

        <!-- Glassmorphic Details Box -->
        <div class="w-full glass-panel rounded-2xl p-10 border border-white/5 bg-gradient-to-b from-white/5 to-transparent">
          <!-- Description -->
          <p class="text-center text-gray-300 text-xl leading-relaxed font-light">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Bottom Section: Stats Grid -->
      <div class="grid grid-cols-2 gap-6">
        <!-- Language -->
        <div class="glass-panel rounded-xl p-6 flex flex-col items-center justify-center gap-2 border border-white/5">
          <div class="flex items-center gap-3 mb-2">
            <span class="w-4 h-4 rounded-full shadow-[0_0_8px_rgba(250,204,21,0.6)]" style="background-color: {{languageColor}}"></span>
            <span class="text-sm text-gray-400 uppercase tracking-wider">Language</span>
          </div>
          <span class="font-bold text-2xl">{{language}}</span>
        </div>
        <!-- Stars -->
        <div class="glass-panel rounded-xl p-6 flex flex-col items-center justify-center gap-2 border border-white/5">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-amber-400 text-2xl">star</span>
            <span class="text-sm text-gray-400 uppercase tracking-wider">Stars</span>
          </div>
          <span class="font-bold text-2xl">{{stars}}</span>
        </div>
        <!-- Forks -->
        <div class="glass-panel rounded-xl p-6 flex flex-col items-center justify-center gap-2 border border-white/5">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-purple-400 text-2xl">fork_right</span>
            <span class="text-sm text-gray-400 uppercase tracking-wider">Forks</span>
          </div>
          <span class="font-bold text-2xl">{{forks}}</span>
        </div>
        <!-- Today -->
        <div class="glass-panel rounded-xl p-6 flex flex-col items-center justify-center gap-2 border border-white/5 relative overflow-hidden">
          <div class="absolute inset-0 bg-primary/5"></div>
          <div class="flex items-center gap-3 mb-2 relative z-10">
            <span class="material-symbols-outlined text-green-400 text-2xl">trending_up</span>
            <span class="text-sm text-gray-400 uppercase tracking-wider">Today</span>
          </div>
          <span class="font-bold text-2xl text-green-400 relative z-10">{{todayStars}}</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-8 flex justify-between items-center opacity-30 text-sm uppercase tracking-widest px-4">
        <span>GIT CARD</span>
        <span class="flex items-center gap-2"><span class="material-symbols-outlined text-sm">code</span> Generated</span>
      </div>
    </div>
  </div>
</body>
</html>
