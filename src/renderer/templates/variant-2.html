<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Variant 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "card-bg": "#ffffff",
            "card-text": "#111827",
            "card-subtext": "#6b7280",
          },
          fontFamily: {
            "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .bg-tech-grid {
      background-image: linear-gradient(to right, #f3f4f6 1px, transparent 1px), linear-gradient(to bottom, #f3f4f6 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-card-bg rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-gray-200 font-display relative">
    <!-- Background Grid Pattern -->
    <div class="absolute inset-0 bg-tech-grid pointer-events-none opacity-60"></div>

    <!-- Card Content -->
    <div class="relative z-10 flex flex-col h-full p-16">
      <!-- Top: Rank Badge & Date -->
      <div class="flex justify-between items-start">
        <div class="flex h-12 shrink-0 items-center justify-center gap-x-3 rounded-full bg-primary/10 pl-5 pr-6 border border-primary/20">
          <span class="material-symbols-outlined text-primary text-2xl">trending_up</span>
          <p class="text-primary text-lg font-bold uppercase tracking-wide">#{{rank}} Trending</p>
        </div>
        <div class="text-card-subtext/40 text-sm font-bold tracking-widest uppercase mt-3">
          GitHub Trending
        </div>
      </div>

      <!-- Middle: Identity -->
      <div class="mt-12 mb-10">
        <div class="flex items-center gap-8 mb-8">
          <div class="h-28 w-28 rounded-full border-8 border-white shadow-lg bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center">
            <span class="text-white text-5xl font-bold">{{rank}}</span>
          </div>
          <div class="flex flex-col">
            <p class="text-card-subtext text-xl font-medium mb-1">{{owner}}</p>
            <h1 class="text-card-text text-6xl font-bold tracking-tight leading-none">{{name}}</h1>
          </div>
        </div>

        <!-- Description Box -->
        <div class="bg-gray-50 rounded-2xl p-10 border border-gray-100">
          <p class="text-card-text/80 text-xl font-normal leading-relaxed">
            {{description}}
          </p>
          <!-- Language Tag inside box -->
          <div class="flex items-center gap-4 mt-6">
            <span class="block w-5 h-5 rounded-full border border-black/5" style="background-color: {{languageColor}}"></span>
            <span class="text-card-text font-bold text-lg">{{language}}</span>
          </div>
        </div>
      </div>

      <!-- Bottom: Stats Grid -->
      <div class="mt-auto grid grid-cols-3 gap-8 border-t border-gray-100 pt-10">
        <div class="flex flex-col gap-2">
          <div class="flex items-center gap-2 text-card-subtext mb-2">
            <span class="material-symbols-outlined text-2xl">star</span>
            <span class="text-sm font-medium uppercase tracking-wider">Stars</span>
          </div>
          <span class="text-card-text text-4xl font-bold tracking-tight">{{stars}}</span>
        </div>
        <div class="flex flex-col gap-2 border-l border-gray-100 pl-8">
          <div class="flex items-center gap-2 text-card-subtext mb-2">
            <span class="material-symbols-outlined text-2xl">call_split</span>
            <span class="text-sm font-medium uppercase tracking-wider">Forks</span>
          </div>
          <span class="text-card-text text-4xl font-bold tracking-tight">{{forks}}</span>
        </div>
        <div class="flex flex-col gap-2 border-l border-gray-100 pl-8">
          <div class="flex items-center gap-2 text-green-600 mb-2">
            <span class="material-symbols-outlined text-2xl">arrow_upward</span>
            <span class="text-sm font-medium uppercase tracking-wider">Today</span>
          </div>
          <span class="text-green-600 text-4xl font-bold tracking-tight">{{todayStars}}</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
