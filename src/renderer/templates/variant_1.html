<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Repo Share Card Variant 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "neon-cyan": "#00f0ff",
            "neon-purple": "#bc13fe",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
          },
          backgroundImage: {
            'tech-grid': 'linear-gradient(to right, #1f2937 1px, transparent 1px), linear-gradient(to bottom, #1f2937 1px, transparent 1px)',
          }
        },
      },
    }
  </script>
  <style>
    .glass-panel {
      background: rgba(17, 26, 34, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glow-text { text-shadow: 0 0 10px rgba(19, 127, 236, 0.5); }
    .bg-grid-pattern {
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, transparent, black, transparent);
    }
  </style>
</head>
<body class="bg-[#050a10] text-white font-display m-0 p-0">
  <div id="card" class="relative w-[380px] aspect-[3/4] bg-[#0a0f16] rounded-3xl overflow-hidden border border-[#1e293b] flex flex-col">
    <!-- Background Visuals -->
    <div class="absolute inset-0 z-0 opacity-20 bg-tech-grid bg-grid-pattern pointer-events-none"></div>
    <div class="absolute top-[-20%] right-[-20%] w-[80%] h-[60%] bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[50%] bg-neon-purple/10 rounded-full blur-[80px] pointer-events-none"></div>

    <!-- Content -->
    <div class="relative z-10 flex flex-col h-full p-6 justify-between">
      <!-- Rank Badge -->
      <div class="flex flex-col items-center gap-6">
        <div class="relative">
          <div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-neon-cyan rounded-full blur opacity-50"></div>
          <div class="relative flex items-center gap-2 px-5 py-1.5 bg-[#0a0f16] rounded-full border border-primary/30 shadow-[0_0_15px_rgba(19,127,236,0.3)]">
            <span class="material-symbols-outlined text-primary text-[18px]">trophy</span>
            <span class="text-sm font-bold tracking-wider text-white">#{{rank}} TRENDING</span>
          </div>
        </div>
      </div>

      <!-- Repo Identity -->
      <div class="flex flex-col items-center flex-grow justify-center gap-6 my-4">
        <!-- Avatar with Glow -->
        <div class="relative">
          <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary via-neon-cyan to-neon-purple blur-md opacity-60"></div>
          <div class="relative w-24 h-24 rounded-full border-2 border-white/10 bg-[#111a22] flex items-center justify-center">
            <span class="text-white text-4xl font-bold">{{firstName}}</span>
          </div>
        </div>

        <!-- Repo Title -->
        <div class="text-center space-y-1">
          <p class="text-[#92adc9] text-sm font-medium tracking-widest uppercase opacity-80">{{owner}}</p>
          <h1 class="text-4xl font-bold tracking-tight text-white glow-text">{{name}}</h1>
        </div>

        <!-- Details Box -->
        <div class="w-full glass-panel rounded-xl p-5 border border-white/5 bg-gradient-to-b from-white/5 to-transparent">
          <div class="flex items-center justify-center gap-2 mb-4 opacity-70">
            <span class="material-symbols-outlined text-base">link</span>
            <p class="text-xs font-mono truncate text-neon-cyan">github.com/{{owner}}/{{name}}</p>
          </div>
          <p class="text-center text-gray-300 text-[15px] leading-relaxed font-light line-clamp-3">
            {{description}}
          </p>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-3">
        <div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5">
          <div class="flex items-center gap-2 mb-1">
            <span class="w-2 h-2 rounded-full shadow-[0_0_8px_rgba(250,204,21,0.6)]" style="background-color: {{languageColor}};"></span>
            <span class="text-xs text-gray-400 uppercase tracking-wider">Language</span>
          </div>
          <span class="font-bold text-lg">{{language}}</span>
        </div>
        <div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5">
          <div class="flex items-center gap-2 mb-1">
            <span class="material-symbols-outlined text-amber-400 text-[18px]">star</span>
            <span class="text-xs text-gray-400 uppercase tracking-wider">Stars</span>
          </div>
          <span class="font-bold text-lg">{{stars}}</span>
        </div>
        <div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5">
          <div class="flex items-center gap-2 mb-1">
            <span class="material-symbols-outlined text-purple-400 text-[18px]">fork_right</span>
            <span class="text-xs text-gray-400 uppercase tracking-wider">Forks</span>
          </div>
          <span class="font-bold text-lg">{{forks}}</span>
        </div>
        <div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5 relative overflow-hidden">
          <div class="absolute inset-0 bg-primary/5"></div>
          <div class="flex items-center gap-2 mb-1 relative z-10">
            <span class="material-symbols-outlined text-green-400 text-[18px]">trending_up</span>
            <span class="text-xs text-gray-400 uppercase tracking-wider">Today</span>
          </div>
          <span class="font-bold text-lg text-green-400 relative z-10">+{{todayStars}}</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
