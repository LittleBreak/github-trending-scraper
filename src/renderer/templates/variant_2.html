<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>GitHub Repo Share Card Variant 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "card-bg": "#ffffff",
            "card-text": "#111827",
            "card-subtext": "#6b7280",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
          },
          backgroundImage: {
            'tech-grid': 'linear-gradient(to right, #f3f4f6 1px, transparent 1px), linear-gradient(to bottom, #f3f4f6 1px, transparent 1px)',
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-[#f6f7f8] font-display m-0 p-0">
  <div id="card" class="relative w-[380px] aspect-[3/4] bg-card-bg rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-gray-200">
    <!-- Background Grid Pattern -->
    <div class="absolute inset-0 bg-tech-grid bg-[length:24px_24px] pointer-events-none opacity-60"></div>

    <!-- Card Content -->
    <div class="relative z-10 flex flex-col h-full p-8">
      <!-- Top: Rank Badge & Date -->
      <div class="flex justify-between items-start">
        <div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 pl-3 pr-4 border border-primary/20">
          <span class="material-symbols-outlined text-primary" style="font-size: 18px;">trending_up</span>
          <p class="text-primary text-xs font-bold uppercase tracking-wide">#{{rank}} Trending</p>
        </div>
        <div class="text-card-subtext/40 text-[10px] font-bold tracking-widest uppercase mt-2">
          GitHub
        </div>
      </div>

      <!-- Middle: Identity -->
      <div class="mt-8 mb-6">
        <div class="flex items-center gap-5 mb-5">
          <div class="h-20 w-20 rounded-full border-4 border-white shadow-lg bg-gray-100 flex items-center justify-center">
            <span class="text-card-text text-3xl font-bold">{{firstName}}</span>
          </div>
          <div class="flex flex-col">
            <p class="text-card-subtext text-sm font-medium mb-0.5">{{owner}}</p>
            <h1 class="text-card-text text-4xl font-bold tracking-tight leading-none">{{name}}</h1>
          </div>
        </div>

        <!-- Description Box -->
        <div class="bg-gray-50 rounded-xl p-5 border border-gray-100">
          <p class="text-card-text/80 text-base font-normal leading-relaxed line-clamp-3">
            {{description}}
          </p>
          <!-- Language Tag -->
          <div class="flex items-center gap-2 mt-4">
            <span class="block w-3 h-3 rounded-full border border-black/5" style="background-color: {{languageColor}};"></span>
            <span class="text-card-text font-bold text-sm">{{language}}</span>
          </div>
        </div>
      </div>

      <!-- Bottom: Stats Grid -->
      <div class="mt-auto grid grid-cols-3 gap-4 border-t border-gray-100 pt-6">
        <div class="flex flex-col gap-1">
          <div class="flex items-center gap-1 text-card-subtext mb-1">
            <span class="material-symbols-outlined" style="font-size: 18px;">star</span>
            <span class="text-xs font-medium uppercase tracking-wider">Stars</span>
          </div>
          <span class="text-card-text text-2xl font-bold tracking-tight">{{stars}}</span>
        </div>
        <div class="flex flex-col gap-1 border-l border-gray-100 pl-4">
          <div class="flex items-center gap-1 text-card-subtext mb-1">
            <span class="material-symbols-outlined" style="font-size: 18px;">call_split</span>
            <span class="text-xs font-medium uppercase tracking-wider">Forks</span>
          </div>
          <span class="text-card-text text-2xl font-bold tracking-tight">{{forks}}</span>
        </div>
        <div class="flex flex-col gap-1 border-l border-gray-100 pl-4">
          <div class="flex items-center gap-1 text-green-600 mb-1">
            <span class="material-symbols-outlined" style="font-size: 18px;">arrow_upward</span>
            <span class="text-xs font-medium uppercase tracking-wider">Today</span>
          </div>
          <span class="text-green-600 text-2xl font-bold tracking-tight">{{todayStars}}</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
