<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Card - Zen Minimalist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#2060df",
          },
          fontFamily: {
            "display": ["Manrope", "Noto Sans SC", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined.thin {
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="card" class="w-[1080px] h-[1440px] bg-white shadow-2xl rounded overflow-hidden flex flex-col justify-between p-16 border border-gray-100 font-display relative">
    <!-- Decorative Background Gradient -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-blue-50/50 to-transparent rounded-full blur-3xl -mr-32 -mt-32 pointer-events-none opacity-60"></div>

    <!-- Card Header: Avatar & Owner -->
    <div class="relative z-10 flex items-center gap-6 opacity-90">
      <div class="w-16 h-16 rounded-full bg-gray-100 overflow-hidden shadow-inner flex items-center justify-center bg-gradient-to-br from-primary to-blue-400">
        <span class="text-white text-2xl font-bold">{{rank}}</span>
      </div>
      <span class="text-gray-500 text-lg font-bold tracking-[0.2em] uppercase">{{owner}}</span>
    </div>

    <!-- Card Body: Asymmetric Typography -->
    <div class="relative z-10 flex-1 flex flex-col justify-center items-start mt-8">
      <!-- Main Title -->
      <h1 class="text-gray-900 text-8xl font-light tracking-tighter leading-[0.9] mb-12">
        {{name}}<span class="text-primary">.</span>
      </h1>

      <!-- Description with hairline left border -->
      <div class="pl-8 border-l-2 border-gray-200">
        <p class="text-gray-500 text-xl font-medium leading-relaxed max-w-2xl">
          {{description}}
        </p>
        <div class="mt-8 flex items-center gap-4">
          <span class="w-5 h-5 rounded-full" style="background-color: {{languageColor}}"></span>
          <span class="text-gray-400 text-lg font-medium">{{language}}</span>
        </div>
      </div>
    </div>

    <!-- Card Footer: Stats -->
    <div class="relative z-10 pt-12 border-t border-gray-100 flex items-end justify-between">
      <!-- Stats Cluster -->
      <div class="flex flex-col gap-8">
        <div class="flex items-center gap-6">
          <span class="material-symbols-outlined thin text-gray-400 text-4xl">star</span>
          <div class="flex flex-col">
            <span class="text-gray-900 text-4xl font-light leading-none">{{stars}}</span>
            <span class="text-gray-400 text-sm uppercase tracking-wider font-semibold mt-1">Stars</span>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <span class="material-symbols-outlined thin text-gray-400 text-4xl">call_split</span>
          <div class="flex flex-col">
            <span class="text-gray-900 text-4xl font-light leading-none">{{forks}}</span>
            <span class="text-gray-400 text-sm uppercase tracking-wider font-semibold mt-1">Forks</span>
          </div>
        </div>
      </div>

      <!-- Trending Badge -->
      <div class="flex flex-col items-end gap-4">
        <div class="flex items-center gap-4 bg-primary/10 px-6 py-3 rounded-full">
          <span class="material-symbols-outlined text-primary text-2xl">trending_up</span>
          <span class="text-primary font-bold text-xl">{{todayStars}}</span>
        </div>
        <span class="text-gray-300 text-sm font-mono uppercase tracking-wider">#{{rank}} Trending</span>
      </div>
    </div>
  </div>
</body>
</html>
