<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Repo Share Card</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#050a10", /* Deep dark background */
                        "glass-surface": "rgba(255, 255, 255, 0.03)",
                        "glass-border": "rgba(255, 255, 255, 0.1)",
                        "neon-cyan": "#00f0ff",
                        "neon-purple": "#bc13fe",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                        'tech-grid': 'linear-gradient(to right, #1f2937 1px, transparent 1px), linear-gradient(to bottom, #1f2937 1px, transparent 1px)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles for glowing effects and glassmorphism */
        .glass-panel {
            background: rgba(17, 26, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glow-text {
            text-shadow: 0 0 10px rgba(19, 127, 236, 0.5);
        }

        .glow-border {
            box-shadow: 0 0 15px rgba(19, 127, 236, 0.3), inset 0 0 10px rgba(19, 127, 236, 0.1);
            border: 1px solid rgba(19, 127, 236, 0.4);
        }

        .neon-accent {
            background: linear-gradient(135deg, #137fec 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Abstract background grid animation setup (static for this output) */
        .bg-grid-pattern {
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }
        
        /* 3:4 Aspect Ratio Container */
        .aspect-3-4 {
            aspect-ratio: 3/4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-white font-display flex items-center justify-center min-h-screen p-4 sm:p-8">
<!-- Main Container: 3:4 Card for Social Sharing -->
<div class="relative w-full max-w-[420px] aspect-3-4 bg-[#0a0f16] rounded-3xl overflow-hidden border border-[#1e293b] shadow-2xl flex flex-col group/card">
<!-- Abstract Background Visuals -->
<div class="absolute inset-0 z-0 opacity-20 bg-tech-grid bg-grid-pattern pointer-events-none"></div>
<div class="absolute top-[-20%] right-[-20%] w-[80%] h-[60%] bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[60%] h-[50%] bg-neon-purple/10 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Content Wrapper -->
<div class="relative z-10 flex flex-col h-full p-6 sm:p-8 justify-between">
<!-- Top Section: Rank & Header -->
<div class="flex flex-col items-center gap-6">
<!-- Rank Badge -->
<div class="relative group">
<div class="absolute -inset-0.5 bg-gradient-to-r from-primary to-neon-cyan rounded-full blur opacity-50 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
<div class="relative flex items-center gap-2 px-5 py-1.5 bg-[#0a0f16] rounded-full border border-primary/30 shadow-[0_0_15px_rgba(19,127,236,0.3)]">
<span class="material-symbols-outlined text-primary text-[18px]">trophy</span>
<span class="text-sm font-bold tracking-wider text-white">#1 TRENDING</span>
</div>
</div>
</div>
<!-- Middle Section: Repo Identity & Details -->
<div class="flex flex-col items-center flex-grow justify-center gap-6 my-4">
<!-- Avatar with Glow -->
<div class="relative">
<div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary via-neon-cyan to-neon-purple blur-md opacity-60"></div>
<div class="relative w-28 h-28 rounded-full border-2 border-white/10 bg-[#111a22] p-1 shadow-2xl">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="React logo or abstract futuristic technology orb representation" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAtwcMDoAXq0QUuhydvWHeSzWXNOBrbajE99yFQx2Q03pneD9OQrWcTF4nZtQEsuMuac2nIuLs-aC5WKh4n-vDrtJrpidFshjHhGOVXMhNsAXADQRzFrbApCpnyZbdQ4OcjONdhCYTfHh-yK5ptJSD532GlK3LxjVXHIdUDh0QAHuxNCKicSMhx8SkBK_0YcjcojjU9A_oTX5NiuPjESMYEl3UwYNapz58Cxu87YULsPvVHqtlWMtTorRPIOD4cJyYSQkgconhaudiz");'>
</div>
</div>
</div>
<!-- Repo Title -->
<div class="text-center space-y-1">
<p class="text-[#92adc9] text-sm font-medium tracking-widest uppercase opacity-80">facebook</p>
<h1 class="text-4xl font-bold tracking-tight text-white glow-text">
                        react
                    </h1>
</div>
<!-- Glassmorphic Details Box -->
<div class="w-full glass-panel rounded-xl p-5 border border-white/5 bg-gradient-to-b from-white/5 to-transparent">
<!-- URL -->
<div class="flex items-center justify-center gap-2 mb-4 opacity-70 hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-base">link</span>
<p class="text-xs font-mono truncate max-w-[200px] text-neon-cyan">github.com/facebook/react</p>
</div>
<!-- Description -->
<p class="text-center text-gray-300 text-[15px] leading-relaxed font-light">
                        A declarative, efficient, and flexible JavaScript library for building user interfaces.
                    </p>
</div>
</div>
<!-- Bottom Section: Stats Grid -->
<div class="grid grid-cols-2 gap-3">
<!-- Language -->
<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5 hover:border-primary/30 transition-colors">
<div class="flex items-center gap-2 mb-1">
<span class="w-2 h-2 rounded-full bg-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.6)]"></span>
<span class="text-xs text-gray-400 uppercase tracking-wider">Language</span>
</div>
<span class="font-bold text-lg">JavaScript</span>
</div>
<!-- Stars -->
<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5 hover:border-primary/30 transition-colors">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-amber-400 text-[18px]">star</span>
<span class="text-xs text-gray-400 uppercase tracking-wider">Stars</span>
</div>
<span class="font-bold text-lg">203k</span>
</div>
<!-- Forks -->
<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5 hover:border-primary/30 transition-colors">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-purple-400 text-[18px]">fork_right</span>
<span class="text-xs text-gray-400 uppercase tracking-wider">Forks</span>
</div>
<span class="font-bold text-lg">42k</span>
</div>
<!-- Today -->
<div class="glass-panel rounded-lg p-3 flex flex-col items-center justify-center gap-1 border border-white/5 hover:border-primary/30 transition-colors relative overflow-hidden">
<div class="absolute inset-0 bg-primary/5"></div>
<div class="flex items-center gap-2 mb-1 relative z-10">
<span class="material-symbols-outlined text-green-400 text-[18px]">trending_up</span>
<span class="text-xs text-gray-400 uppercase tracking-wider">Today</span>
</div>
<span class="font-bold text-lg text-green-400 relative z-10">+120</span>
</div>
</div>
<!-- Footer: Watermark/branding hint -->
<div class="mt-5 flex justify-between items-center opacity-30 text-[10px] uppercase tracking-widest px-2">
<span>GIT CARD</span>
<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[10px]">code</span> Generated</span>
</div>
</div>
</div>
</body></html>
