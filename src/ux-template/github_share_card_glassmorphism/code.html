<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Glassmorphism</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        .glass-pill {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .dark .glass-panel {
            background: rgba(25, 16, 34, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .dark .glass-pill {
            background: rgba(25, 16, 34, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mesh-gradient-bg {
            background-color: #f7f6f8;
            background-image: 
                radial-gradient(at 0% 0%, hsla(276,68%,68%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(189,68%,78%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(333,68%,78%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(262,72%,73%,1) 0, transparent 50%), 
                radial-gradient(at 80% 100%, hsla(273,65%,48%,0.4) 0, transparent 50%), 
                radial-gradient(at 0% 50%, hsla(196,65%,73%,1) 0, transparent 50%);
        }
        
        .dark .mesh-gradient-bg {
            background-color: #191022;
            background-image: 
                radial-gradient(at 0% 0%, hsla(276,68%,28%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(273,65%,48%,0.6) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(262,72%,33%,1) 0, transparent 50%);
        }
        
        /* 3:4 Aspect Ratio Utility */
        .aspect-3-4 {
            aspect-ratio: 3 / 4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#140d1b] dark:text-white font-display min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="flex items-center px-4 pt-6 pb-2 justify-between z-20 relative">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full bg-white/20 hover:bg-white/40 backdrop-blur-md transition-colors text-[#140d1b] dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-[#140d1b] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Share Card Preview</h2>
<button class="flex size-10 items-center justify-center rounded-full bg-white/20 hover:bg-white/40 backdrop-blur-md transition-colors">
<span class="material-symbols-outlined text-[#734c9a] dark:text-[#a78bfa]">help</span>
</button>
</header>
<!-- Main Content Area with Mesh Gradient -->
<main class="flex-1 relative w-full flex flex-col items-center justify-start py-4 overflow-hidden mesh-gradient-bg">
<!-- Preview Container -->
<div class="relative w-full max-w-sm px-6 pb-6 z-10">
<!-- The Glass Card (3:4 Aspect Ratio) -->
<div class="glass-panel aspect-3-4 w-full rounded-2xl p-6 flex flex-col justify-between relative overflow-hidden group/card shadow-2xl transition-transform hover:scale-[1.02] duration-500">
<!-- Decorative Top Blob inside card -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 blur-2xl rounded-full pointer-events-none"></div>
<!-- Card Header -->
<div class="flex flex-col gap-4 relative z-10">
<div class="flex items-center gap-3">
<div class="size-12 rounded-full bg-white shadow-sm overflow-hidden border-2 border-white/50" data-alt="React logo avatar" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCNY1GtzTnIp26TUK2CErdhoSyrx173HNj-Tx8Kh0f2K_ngpNRY7D7wIRHmeq3NB8-c8iO6ZGSNcLjzfA97u2SNgnFc_MT4E0dtsoRDD5hbekoB3YmiCTrTeDMDnnrIWtd386hczZfYfdV8SOGFt827nMPIxEcvABkT4S6pYdnqWvkSyqqkTRKBv2sYiA3wYhfnQDfvWMQnErO9zCnfB6oVnd4GLoeCUxFHcVOlSrAk3sJadp3d_7bg3SZ5Ak4PXq1lLFeaRZmd0gh4"); background-size: cover; background-position: center;'></div>
<div class="flex flex-col">
<span class="text-xs font-semibold uppercase tracking-wider text-[#734c9a] dark:text-[#d8b4fe] opacity-80">Repository</span>
<h3 class="text-2xl font-extrabold text-[#140d1b] dark:text-white leading-tight">facebook / react</h3>
</div>
</div>
</div>
<!-- Description Block -->
<div class="flex-1 flex flex-col justify-center py-4 relative z-10">
<div class="glass-pill p-4 rounded-xl">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-sm">code</span>
<span class="text-xs font-bold text-primary dark:text-[#d8b4fe]">TypeScript</span>
</div>
<p class="text-[#140d1b]/80 dark:text-white/90 text-lg font-medium leading-relaxed font-display">
                            A declarative, efficient, and flexible JavaScript library for building user interfaces.
                        </p>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-3 relative z-10">
<div class="glass-pill p-3 rounded-xl flex flex-col items-start gap-1">
<div class="flex items-center gap-1 text-[#734c9a] dark:text-[#d8b4fe]">
<span class="material-symbols-outlined text-sm">star</span>
<span class="text-xs font-bold uppercase tracking-wider">Stars</span>
</div>
<p class="text-2xl font-extrabold text-[#140d1b] dark:text-white">203k</p>
</div>
<div class="glass-pill p-3 rounded-xl flex flex-col items-start gap-1">
<div class="flex items-center gap-1 text-[#734c9a] dark:text-[#d8b4fe]">
<span class="material-symbols-outlined text-sm">fork_right</span>
<span class="text-xs font-bold uppercase tracking-wider">Forks</span>
</div>
<p class="text-2xl font-extrabold text-[#140d1b] dark:text-white">42k</p>
</div>
<div class="col-span-2 glass-pill p-3 rounded-xl flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="p-1.5 rounded-full bg-green-400/20 text-green-700 dark:text-green-300">
<span class="material-symbols-outlined text-sm block">trending_up</span>
</div>
<span class="text-sm font-medium text-[#140d1b] dark:text-white">Today's Activity</span>
</div>
<p class="text-xl font-extrabold text-[#140d1b] dark:text-white">+125</p>
</div>
</div>
<!-- Watermark -->
<div class="absolute bottom-4 right-4 opacity-30 pointer-events-none">
<span class="material-symbols-outlined text-4xl text-[#140d1b] dark:text-white rotate-12">code_blocks</span>
</div>
</div>
<!-- Hint text -->
<p class="text-center text-xs text-[#140d1b]/50 dark:text-white/50 mt-4 font-medium">Previewing 3:4 Mode for Xiaohongshu</p>
</div>
</main>
<!-- Controls Panel -->
<div class="relative z-20 bg-white/80 dark:bg-[#191022]/80 backdrop-blur-xl border-t border-white/20 rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.05)]">
<div class="max-w-md mx-auto p-6 space-y-6">
<!-- Slider Control -->
<div class="space-y-3">
<div class="flex items-center justify-between">
<label class="text-sm font-bold text-[#140d1b] dark:text-white flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">blur_on</span>
                        Glass Intensity
                    </label>
<span class="text-xs font-mono text-[#734c9a] dark:text-[#d8b4fe] bg-primary/10 px-2 py-1 rounded">24px</span>
</div>
<div class="relative h-2 w-full bg-gray-200 dark:bg-white/10 rounded-full overflow-hidden">
<div class="absolute left-0 top-0 h-full w-[60%] bg-primary rounded-full"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 rounded-xl bg-background-light dark:bg-white/5 border border-transparent hover:border-primary/30 text-[#140d1b] dark:text-white text-sm font-bold transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">palette</span>
                    Theme
                </button>
<button class="flex items-center justify-center gap-2 h-12 rounded-xl bg-background-light dark:bg-white/5 border border-transparent hover:border-primary/30 text-[#140d1b] dark:text-white text-sm font-bold transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">refresh</span>
                    Regenerate
                </button>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-xl shadow-lg shadow-primary/25 flex items-center justify-center gap-2 font-bold text-lg tracking-wide transition-all active:scale-95">
<span class="material-symbols-outlined">ios_share</span>
                Share to Xiaohongshu
            </button>
</div>
</div>
</body></html>
