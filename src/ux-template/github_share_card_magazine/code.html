<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Magazine</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Noto+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d41132",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221013",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .barcode-stripes {
            background: repeating-linear-gradient(
                90deg,
                #fff 0px,
                #fff 2px,
                transparent 2px,
                transparent 4px,
                #fff 4px,
                #fff 5px,
                transparent 5px,
                transparent 7px,
                #fff 7px,
                #fff 10px,
                transparent 10px,
                transparent 12px
            );
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4 font-display antialiased selection:bg-primary selection:text-white">
<!-- Design Root Container -->
<div class="flex flex-col items-center gap-8 w-full max-w-md">
<!-- Header Controls -->
<div class="w-full flex justify-between items-center px-4 max-w-[375px]">
<button class="text-gray-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="text-xs font-sans tracking-widest text-gray-400 uppercase">Share Preview</span>
<button class="text-gray-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</div>
<!-- 3:4 Magazine Card -->
<!-- Fixed dimensions based on ratio, responsive max-width -->
<div class="relative w-full max-w-[375px] aspect-[3/4] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] overflow-hidden bg-[#1a0b0d] group">
<!-- Background Image Layer -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60 mix-blend-overlay" data-alt="Abstract dark liquid oil texture with red and black swirls" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcoudpflosSU9HF3OWVWiDoGc9GCyaO7q4sPg98C52rkG6sTJfjRA7WPC4Tt8XKX2LdmqSEkK1DuICTIHvC7zzydsUNv4TS9RRlTAcO1OH8i8Slr4clZuZUSwkmaDz8W1n3bvQvA-Z3laccex1kP8F3XUKBlM-07oINaqY1Uw07b_0CzYrJABjNqHHSUi_yAxQUt9KlS96r_IQ7apawFDFArDafb_v9roXjRx2N35aU5jHEYuEf89aXupYPPUDmyFVVMEfkHJaK7sI"/>
<!-- Gradient Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-b from-[#221013]/40 via-transparent to-[#221013]/90"></div>
<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
</div>
<!-- Content Layer -->
<div class="relative z-10 h-full flex flex-col justify-between p-6">
<!-- Magazine Top Header -->
<div class="flex flex-col items-center border-b border-white/20 pb-4">
<div class="flex items-center justify-between w-full mb-1">
<span class="text-[10px] font-sans font-bold tracking-[0.3em] text-white/70 uppercase">Open Source Monthly</span>
<span class="text-[10px] font-sans font-bold tracking-[0.3em] text-primary uppercase">Sept 2023</span>
</div>
<!-- Masthead Title -->
<h1 class="text-6xl font-black italic tracking-tighter text-white drop-shadow-lg text-center leading-[0.85] mt-2">
                        GITHUB
                    </h1>
</div>
<!-- Central Focus (The "Story") -->
<div class="flex flex-col flex-grow justify-center py-4">
<!-- Issue Number Badge -->
<div class="self-start bg-primary text-white px-3 py-1 text-xs font-bold font-sans tracking-widest uppercase mb-4 shadow-lg transform -rotate-2">
                        Issue No. 1
                    </div>
<!-- Repo Name -->
<h2 class="text-7xl font-display font-light text-white leading-[0.9] tracking-tight mb-2">
                        React<span class="text-primary">.</span>js
                    </h2>
<!-- Sub-headline -->
<p class="text-xl text-gray-300 font-display italic leading-snug max-w-[85%] border-l-2 border-primary pl-4 my-4">
                        "The framework reshaping the web: A deep dive into declarative UIs."
                    </p>
<!-- Owner Byline -->
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-primary text-sm">verified</span>
<p class="text-sm font-sans text-gray-400 uppercase tracking-widest">Curated by Facebook</p>
</div>
</div>
<!-- Footer Stats (Cover Lines) -->
<div class="grid grid-cols-2 gap-x-6 gap-y-6 items-end pb-2">
<!-- Stat 1 -->
<div class="group/stat cursor-default">
<div class="h-[1px] w-8 bg-primary mb-2"></div>
<h3 class="text-3xl font-bold text-white leading-none">203k</h3>
<p class="text-[10px] uppercase tracking-[0.2em] font-sans text-gray-400 mt-1">Stargazers</p>
</div>
<!-- Stat 2 -->
<div class="group/stat cursor-default">
<div class="h-[1px] w-8 bg-primary mb-2"></div>
<h3 class="text-3xl font-bold text-white leading-none">42k</h3>
<p class="text-[10px] uppercase tracking-[0.2em] font-sans text-gray-400 mt-1">Forks</p>
</div>
<!-- Stat 3 (Language) -->
<div class="col-span-2 flex items-center justify-between border-t border-white/10 pt-4 mt-2">
<div>
<p class="text-[10px] uppercase tracking-[0.2em] font-sans text-primary mb-1">Language</p>
<p class="text-2xl font-display italic text-white">JavaScript</p>
</div>
<!-- Decorative Barcode -->
<div class="flex flex-col items-end opacity-80">
<div class="w-24 h-8 barcode-stripes mix-blend-screen"></div>
<span class="text-[8px] font-sans text-white tracking-[0.3em] mt-1">001189-REACT</span>
</div>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full max-w-[375px] bg-primary hover:bg-[#b00e2a] text-white py-4 rounded-lg flex items-center justify-center gap-2 font-sans font-medium text-sm transition-all shadow-lg active:scale-95 group">
<span class="material-symbols-outlined group-hover:animate-bounce">save_alt</span>
            Save Cover to Photos
        </button>
</div>
</body></html>
