<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Manga Card Generator</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20d0d",
                        "background-light": "#f8f5f5",
                        "background-dark": "#221010",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    backgroundImage: {
                        'halftone': 'radial-gradient(circle, #f20d0d 1px, transparent 1.5px)',
                        'halftone-white': 'radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1.5px)',
                        'action-lines': 'repeating-conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255,255,255,0.05) 10deg 20deg)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Manga Styles */
        .manga-shadow-text {
            text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        .manga-panel-border {
            border: 3px solid #000;
            box-shadow: 4px 4px 0px rgba(242, 13, 13, 0.4);
        }

        .clip-burst {
            clip-path: polygon(20% 0%, 35% 15%, 50% 0%, 65% 15%, 80% 0%, 100% 20%, 85% 35%, 100% 50%, 85% 65%, 100% 80%, 80% 100%, 65% 85%, 50% 100%, 35% 85%, 20% 100%, 0% 80%, 15% 65%, 0% 50%, 15% 35%, 0% 20%);
        }

        .clip-speech-bubble {
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 60% 85%, 40% 100%, 45% 85%, 0% 85%);
        }
        
        .comic-border-b {
            border-bottom: 2px solid #333;
        }

        /* Action lines background animation simulation */
        .bg-rays {
            background: repeating-conic-gradient(
                from 0deg, 
                #1a1a1a 0deg 15deg, 
                #222 15deg 30deg
            );
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex flex-col">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-50">
<button class="text-black dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-black dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Manga Card Gen</h2>
<div class="flex size-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-transparent text-black dark:text-white hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-start p-4 w-full max-w-md mx-auto relative z-0">
<!-- Headline -->
<h3 class="text-black dark:text-white tracking-tight text-xl font-bold leading-tight px-4 text-center pb-6 pt-2">
            Variant 17: Comic Style
        </h3>
<!-- Card Container (3:4 Ratio) -->
<div class="relative w-full aspect-[3/4] bg-white dark:bg-[#111] rounded-none shadow-2xl overflow-hidden border-4 border-black dark:border-white/10 group">
<!-- Global Background Texture -->
<div class="absolute inset-0 bg-halftone opacity-[0.05] pointer-events-none z-10"></div>
<div class="absolute inset-0 bg-rays opacity-100 z-0"></div>
<!-- Content Grid Layout -->
<div class="absolute inset-0 z-20 flex flex-col p-4 gap-4">
<!-- TOP SECTION: HEADER + AVATAR -->
<div class="flex flex-row h-1/4 gap-3">
<!-- Avatar Panel -->
<div class="w-1/3 relative manga-panel-border bg-black overflow-hidden transform -rotate-2">
<img class="w-full h-full object-cover grayscale contrast-125 brightness-110" data-alt="User avatar with manga halftone filter applied" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFJONb6XOoyKNAcvBtk4TfV2fohgKhIu9IKtuOSndmdlBW2fxQeOdPPqiKa2Kvv_D_WToVQ8Xo5JsceFQck1Br57Y_VmSxvAn9TuUecKck1Daqg_imqBX-KlmqpKFTQDrc4VTv0bzcClUaAH6tiFMQ3Y5C2sN-gge16srDTBKCUXySO502-V3EAeoH6_uLoFAAmOjcRmTDUBDFmq9Czn9PR8jGwxdcEaJx5SUHCnsFFI5wyE9OGvp-KrHVOGzeaU3sk6CIJSXV-38z"/>
<!-- Halftone Overlay on Avatar -->
<div class="absolute inset-0 bg-halftone-white opacity-40 mix-blend-overlay"></div>
</div>
<!-- Title Panel -->
<div class="flex-1 flex flex-col justify-center items-start pl-2 relative">
<!-- Action lines behind text -->
<div class="absolute inset-0 bg-action-lines opacity-20 -z-10 rounded-lg"></div>
<div class="bg-primary px-3 py-1 -rotate-1 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mb-2 inline-block">
<span class="text-white text-xs font-black tracking-widest uppercase">Repository</span>
</div>
<h1 class="text-5xl font-black text-white italic tracking-tighter uppercase leading-[0.9] manga-shadow-text transform skew-x-[-10deg]">
                             React<br/>Native
                         </h1>
</div>
</div>
<!-- MIDDLE SECTION: STATS EXPLOSIONS -->
<div class="flex-1 relative flex items-center justify-center">
<!-- RANK BADGE (Floating absolute) -->
<div class="absolute top-0 left-0 z-30 transform -rotate-12 -translate-y-4">
<div class="bg-primary text-white p-6 clip-burst shadow-lg flex flex-col items-center justify-center size-32 animate-pulse">
<span class="text-xs font-bold mt-2">RANK</span>
<span class="text-4xl font-black italic">S+</span>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-4 w-full h-full">
<!-- Stars -->
<div class="relative border-4 border-white bg-black/50 backdrop-blur-sm p-4 flex flex-col items-center justify-center transform rotate-1 rounded-sm">
<div class="absolute top-[-15px] right-[-10px] bg-white text-black px-2 py-1 text-xs font-bold border-2 border-black rotate-3">
                                STARS
                            </div>
<span class="material-symbols-outlined text-primary text-5xl mb-1" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-4xl font-black text-white tracking-tighter">115k</span>
<span class="text-xs text-gray-300 font-bold uppercase tracking-widest mt-1">Stargazers</span>
</div>
<!-- Forks -->
<div class="relative border-4 border-white bg-black/50 backdrop-blur-sm p-4 flex flex-col items-center justify-center transform -rotate-1 rounded-sm">
<div class="absolute bottom-[-15px] left-[-10px] bg-primary text-white px-2 py-1 text-xs font-bold border-2 border-black -rotate-3 z-10">
                                FORKS
                            </div>
<span class="material-symbols-outlined text-white text-5xl mb-1">fork_right</span>
<span class="text-4xl font-black text-white tracking-tighter">25k</span>
<span class="text-xs text-gray-300 font-bold uppercase tracking-widest mt-1">Network</span>
</div>
</div>
</div>
<!-- BOTTOM SECTION: ISSUES & FOOTER -->
<div class="h-1/4 flex flex-col gap-2">
<!-- Language & Issues Strip -->
<div class="flex items-center gap-2">
<!-- Speech Bubble for Language -->
<div class="relative bg-white text-black p-4 pb-6 clip-speech-bubble min-w-[120px]">
<p class="text-sm font-black uppercase text-center leading-tight">It's<br/>JavaScript!</p>
</div>
<!-- Issues Strip -->
<div class="flex-1 bg-black border-2 border-white p-2 flex justify-between items-center transform rotate-1 shadow-[4px_4px_0px_#f20d0d]">
<div class="flex flex-col">
<span class="text-[10px] text-gray-400 uppercase font-bold">Open Issues</span>
<span class="text-xl font-bold text-primary">429</span>
</div>
<div class="h-8 w-[1px] bg-gray-700"></div>
<div class="flex flex-col items-end">
<span class="text-[10px] text-gray-400 uppercase font-bold">Updated</span>
<span class="text-sm font-bold text-white">2h ago</span>
</div>
</div>
</div>
<!-- Footer URL -->
<div class="mt-auto bg-primary/90 text-white p-2 text-center text-xs font-mono tracking-widest border-t-2 border-black">
                        GITHUB.COM/FACEBOOK/REACT-NATIVE
                    </div>
</div>
<!-- Decorative corner accents -->
<div class="absolute top-2 right-2 size-4 border-t-4 border-r-4 border-white"></div>
<div class="absolute bottom-2 left-2 size-4 border-b-4 border-l-4 border-white"></div>
</div>
</div>
</main>
<!-- Bottom Controls -->
<div class="w-full bg-background-light dark:bg-background-dark p-6 pb-8 rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.2)] relative z-50 mt-4">
<!-- Drag Handle -->
<div class="flex justify-center mb-6">
<div class="h-1.5 w-12 rounded-full bg-gray-300 dark:bg-gray-700"></div>
</div>
<div class="flex flex-col gap-4 max-w-md mx-auto">
<!-- Primary Action -->
<button class="w-full h-14 bg-primary hover:bg-red-600 text-white rounded-full flex items-center justify-center gap-3 shadow-lg shadow-primary/30 transition-all active:scale-95 group">
<span class="material-symbols-outlined group-hover:animate-bounce">share</span>
<span class="text-lg font-bold tracking-wide">Share on Xiaohongshu</span>
</button>
<!-- Secondary Actions -->
<div class="grid grid-cols-2 gap-3">
<button class="h-12 bg-white dark:bg-[#341818] text-black dark:text-white border border-gray-200 dark:border-transparent rounded-full flex items-center justify-center gap-2 hover:bg-gray-50 dark:hover:bg-[#401e1e] transition-colors">
<span class="material-symbols-outlined text-xl">shuffle</span>
<span class="text-sm font-bold">Remix Layout</span>
</button>
<button class="h-12 bg-white dark:bg-[#341818] text-black dark:text-white border border-gray-200 dark:border-transparent rounded-full flex items-center justify-center gap-2 hover:bg-gray-50 dark:hover:bg-[#401e1e] transition-colors">
<span class="material-symbols-outlined text-xl">edit</span>
<span class="text-sm font-bold">Edit Content</span>
</button>
</div>
<p class="text-center text-xs text-gray-500 dark:text-gray-400 font-medium mt-2">
                Optimized for 3:4 aspect ratio export
            </p>
</div>
</div>
</body></html>
