<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitHub Share Card Swiss Style</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom utility for the swiss typographic style */
        .swiss-offset-text {
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white overflow-hidden h-screen flex flex-col selection:bg-primary selection:text-white">
<!-- Top App Bar -->
<header class="flex items-center justify-between px-4 py-4 bg-background-light dark:bg-background-dark z-10 shrink-0">
<button class="flex items-center justify-center w-10 h-10 rounded hover:bg-black/5 dark:hover:bg-white/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight lowercase">share card</h1>
<button class="flex items-center justify-center w-10 h-10 rounded hover:bg-black/5 dark:hover:bg-white/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[24px]">more_horiz</span>
</button>
</header>
<!-- Main Content: Preview Canvas -->
<main class="flex-1 overflow-y-auto no-scrollbar flex flex-col items-center justify-center p-6 pb-24 relative w-full">
<!-- Canvas Container -->
<div class="relative w-full max-w-[340px] shadow-2xl shadow-primary/30 group cursor-default transition-transform duration-500 ease-out hover:scale-[1.02]">
<!-- THE SWISS STYLE CARD -->
<!-- Aspect Ratio 3:4 for Social Media -->
<div class="aspect-[3/4] w-full bg-primary flex flex-col text-white relative overflow-hidden border-[6px] border-white">
<!-- Background Decorative Pattern -->
<div class="absolute right-[-15%] top-[-8%] text-white/5 font-bold text-[160px] leading-none select-none pointer-events-none -rotate-6 origin-top-right whitespace-nowrap z-0">
                    GITHUB REPO
                </div>
<!-- Card Content -->
<div class="relative z-10 flex flex-col h-full">
<!-- Row 1: Header Info -->
<div class="border-b-[4px] border-white p-5 flex justify-between items-start bg-primary">
<div class="flex flex-col gap-1">
<span class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-90">Repository</span>
<span class="text-xs font-bold tracking-widest uppercase bg-white text-primary px-1 w-fit">Public</span>
</div>
<!-- Avatar/Icon -->
<div class="w-12 h-12 bg-white overflow-hidden border-2 border-white shadow-sm">
<img alt="Avatar" class="w-full h-full object-cover grayscale contrast-125" data-alt="Abstract geometric avatar representing the repository owner" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_OjY4j-tktg-UaoAa6hvOjyFb9FH-PCzcCZeJuAJgcadTNOxTjNfOW1QAHe2QWNdJiy35lOQQBITvKHBVUzwOJasyzEz2hG8qL6kFpAeuPvkkgDIflGP3I3bzngojjgh934ZZmec-gj85QqCYYrF1oYjIg1r1myBzepSZkwArAuFIOFC08WqzJ1MftsP30k_YRBs08QNJSTEXcSIZ26DMjjK9dSIXPLov5Bp_kXxgfhBTlh8nPP7USzeU9Q_EhwIVwE9h9yC8K9Py"/>
</div>
</div>
<!-- Row 2: Main Typography (Swiss Style Header) -->
<div class="flex-1 flex flex-col justify-center px-5 py-4 border-b-[4px] border-white relative bg-primary">
<h2 class="text-[3.2rem] font-bold uppercase leading-[0.8] tracking-tighter break-words swiss-offset-text">
                            TRANS<br/>FORMERS
                        </h2>
<div class="mt-6 w-12 h-2 bg-white"></div>
<p class="mt-4 text-sm font-medium leading-snug max-w-[95%] opacity-100">
                            State-of-the-art Machine Learning for Pytorch, TensorFlow, and JAX.
                        </p>
</div>
<!-- Row 3: Stats Grid -->
<div class="grid grid-cols-3 border-b-[4px] border-white h-28 bg-primary">
<!-- Stat 1 -->
<div class="border-r-[4px] border-white p-4 flex flex-col justify-between items-start group/stat hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">star</span>
<div>
<p class="text-2xl font-bold leading-none tracking-tight">124k</p>
<p class="text-[9px] uppercase font-bold tracking-widest opacity-80 mt-1">Stars</p>
</div>
</div>
<!-- Stat 2 -->
<div class="border-r-[4px] border-white p-4 flex flex-col justify-between items-start group/stat hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">call_split</span>
<div>
<p class="text-2xl font-bold leading-none tracking-tight">24k</p>
<p class="text-[9px] uppercase font-bold tracking-widest opacity-80 mt-1">Forks</p>
</div>
</div>
<!-- Stat 3 -->
<div class="p-4 flex flex-col justify-between items-start group/stat hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">code</span>
<div>
<p class="text-2xl font-bold leading-none tracking-tight">Py</p>
<p class="text-[9px] uppercase font-bold tracking-widest opacity-80 mt-1">Lang</p>
</div>
</div>
</div>
<!-- Row 4: Footer -->
<div class="p-4 flex items-center justify-between bg-white text-primary h-14">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">qr_code_2</span>
<span class="text-[10px] font-bold tracking-widest uppercase">github.com/huggingface</span>
</div>
<div class="text-[10px] font-bold tracking-widest uppercase border-2 border-primary px-2 py-0.5 rounded-full">
                            SWISS_V8
                        </div>
</div>
</div>
</div>
</div>
<!-- Helper text -->
<div class="mt-8 text-center opacity-60">
<p class="text-xs font-medium uppercase tracking-widest">Preview Mode</p>
</div>
</main>
<!-- Controls Bottom Sheet -->
<div class="bg-white dark:bg-[#15152a] rounded-t-xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] border-t border-slate-200 dark:border-white/5 z-20 shrink-0 w-full max-w-lg mx-auto fixed bottom-0 left-0 right-0 lg:relative lg:rounded-xl lg:mb-6 lg:border lg:shadow-xl">
<!-- Handle -->
<div class="flex items-center justify-center pt-3 pb-1 lg:hidden">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="p-5 pb-8 flex flex-col gap-5">
<!-- URL Input -->
<div class="flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 pl-1">Target Repository</label>
<div class="flex items-center gap-2">
<div class="relative flex-1 group/input">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-[20px] group-focus-within/input:text-primary transition-colors">link</span>
</div>
<input class="w-full bg-slate-100 dark:bg-white/5 border-none rounded py-3 pl-10 pr-3 text-sm font-medium text-slate-900 dark:text-white focus:ring-2 focus:ring-primary placeholder-slate-400 transition-all" placeholder="Paste GitHub URL..." type="text" value="https://github.com/huggingface/transformers"/>
</div>
<button aria-label="Paste" class="bg-slate-200 dark:bg-white/10 hover:bg-slate-300 dark:hover:bg-white/20 text-slate-900 dark:text-white h-[44px] w-[44px] rounded flex items-center justify-center transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[20px]">content_paste</span>
</button>
</div>
</div>
<!-- Toggles (Compact Grid) -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-between px-3 py-2.5 rounded border border-slate-200 dark:border-white/10 bg-white dark:bg-transparent hover:border-primary/50 transition-colors cursor-pointer group/toggle">
<span class="text-xs font-bold uppercase tracking-wide text-slate-600 dark:text-slate-300">Stats</span>
<div class="w-8 h-4 bg-primary rounded-full relative transition-colors">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm"></div>
</div>
</button>
<button class="flex items-center justify-between px-3 py-2.5 rounded border border-slate-200 dark:border-white/10 bg-white dark:bg-transparent hover:border-primary/50 transition-colors cursor-pointer group/toggle">
<span class="text-xs font-bold uppercase tracking-wide text-slate-600 dark:text-slate-300">Description</span>
<div class="w-8 h-4 bg-primary rounded-full relative transition-colors">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full shadow-sm"></div>
</div>
</button>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-[#0000d0] text-white font-bold h-12 rounded flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-primary/25 cursor-pointer mt-2">
<span class="material-symbols-outlined">download</span>
<span>Export Image</span>
</button>
</div>
</div>
</body></html>
